<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UAV · USV Security Lab — Linux / Ubuntu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>

:root{
  --display:'Syne', system-ui, sans-serif;
  --body:'Inter', system-ui, sans-serif;
  --mono:'JetBrains Mono', ui-monospace, monospace;

  /* DARK (default) — telemetry console */
  --bg:#07100f; --bg2:#0a1817; --panel:#0c1f1d; --panel2:#102826;
  --line:rgba(98,200,196,.16); --line-strong:rgba(98,200,196,.30);
  --ink:#cfe7e5; --ink-dim:#7ea9a6; --ink-bright:#f1fbfa;

  --teal:#1ec7c0; --teal-soft:#5fe0da; --teal-deep:#0e5654; --teal-ghost:rgba(30,199,192,.10); --teal-ghost2:rgba(30,199,192,.18);
  --amber:#f1c34a; --red:#f0716e; --green:#54d196; --blue:#5bb8e6;

  --on-deep:#f1fbfa;
  --hero:radial-gradient(ellipse 78% 62% at 50% 30%, #0f3937 0%, #07100f 72%);
  --shadow:0 12px 44px rgba(0,0,0,.4);
  --shadow-sm:0 4px 18px rgba(0,0,0,.28);
  --topbar:rgba(8,20,19,.86);
  --side:#081514;

  --r:14px; --r-sm:9px;
  --sidebar-w:280px; --topbar-h:60px;
  --maxw:1080px;
}
[data-theme="light"]{
  --bg:#f3f7f6; --bg2:#eaf2f1; --panel:#ffffff; --panel2:#f3faf9;
  --line:rgba(13,86,84,.14); --line-strong:rgba(13,86,84,.26);
  --ink:#16302e; --ink-dim:#577471; --ink-bright:#06201e;

  --teal:#0d8f8a; --teal-soft:#0a716d; --teal-deep:#0c605d; --teal-ghost:rgba(13,143,138,.08); --teal-ghost2:rgba(13,143,138,.15);
  --amber:#b07d0a; --red:#cf4b48; --green:#1f9d68; --blue:#2c82b8;

  --on-deep:#f3faf9;
  --hero:radial-gradient(ellipse 90% 70% at 50% 26%, #d7efed 0%, #f3f7f6 70%);
  --shadow:0 12px 40px rgba(13,86,84,.12);
  --shadow-sm:0 4px 16px rgba(13,86,84,.08);
  --topbar:rgba(255,255,255,.9);
  --side:#eef5f4;
}

*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  background:var(--bg); color:var(--ink);
  font-family:var(--body); font-size:15px; line-height:1.65;
  -webkit-font-smoothing:antialiased; overflow-x:hidden;
  transition:background .3s ease,color .3s ease;
}
a{color:var(--teal-soft);text-decoration:none}
::selection{background:var(--teal);color:#04201e}
strong,b{color:var(--ink-bright);font-weight:600}
.mono{font-family:var(--mono)}
.hidden{display:none !important}
@media (prefers-reduced-motion:reduce){
  html{scroll-behavior:auto}
  *{animation-duration:.001ms !important;transition-duration:.05ms !important}
}

/* scrollbars */
*::-webkit-scrollbar{width:9px;height:9px}
*::-webkit-scrollbar-thumb{background:var(--line-strong);border-radius:6px}
*::-webkit-scrollbar-track{background:transparent}

/* ============ TOPBAR ============ */
.topbar{
  position:fixed;top:0;left:0;right:0;height:var(--topbar-h);z-index:300;
  display:flex;align-items:center;gap:14px;padding:0 18px;
  background:var(--topbar);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line);
}
.brand{display:flex;align-items:center;gap:11px;font-family:var(--display);font-weight:800;
  font-size:14px;letter-spacing:.2px;color:var(--ink-bright);white-space:nowrap}
.brand .dot{width:10px;height:10px;border-radius:50%;background:var(--teal);
  box-shadow:0 0 0 4px var(--teal-ghost),0 0 14px var(--teal);flex-shrink:0}
.brand small{display:block;font-family:var(--mono);font-size:9px;letter-spacing:2.5px;
  color:var(--teal);font-weight:500;margin-top:1px}
.tb-spacer{flex:1}

/* progress (in topbar) */
.tb-progress{display:flex;align-items:center;gap:10px;min-width:150px}
.tb-progress .ring{position:relative;width:34px;height:34px;flex-shrink:0}
.tb-progress .ring svg{transform:rotate(-90deg)}
.tb-progress .ring .pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:9px;font-weight:600;color:var(--teal-soft)}
.tb-progress .pmeta{font-family:var(--mono);font-size:9.5px;line-height:1.35;color:var(--ink-dim);letter-spacing:.4px}
.tb-progress .pmeta b{color:var(--ink-bright);font-weight:600}

/* segmented + toggles */
.seg{display:inline-flex;border:1px solid var(--line-strong);border-radius:999px;overflow:hidden;background:var(--panel)}
.seg-btn{appearance:none;border:none;cursor:pointer;background:transparent;color:var(--ink-dim);
  font-family:var(--mono);font-size:10.5px;font-weight:500;letter-spacing:.6px;padding:7px 13px;
  display:flex;align-items:center;gap:6px;transition:all .18s}
.seg-btn svg{width:13px;height:13px}
.seg-btn.active{background:var(--teal-deep);color:var(--on-deep)}
.seg-btn:not(.active):hover{color:var(--teal-soft)}
.icon-btn{appearance:none;cursor:pointer;width:38px;height:38px;border-radius:50%;flex-shrink:0;
  border:1px solid var(--line-strong);background:var(--panel);color:var(--ink);
  display:flex;align-items:center;justify-content:center;transition:all .18s}
.icon-btn:hover{border-color:var(--teal);color:var(--teal-soft)}
.icon-btn svg{width:18px;height:18px}
.menu-btn{display:none}
.tb-label{font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--ink-dim);
  text-transform:uppercase;margin-right:-4px}

/* ============ SIDEBAR ============ */
.sidebar{
  position:fixed;top:var(--topbar-h);bottom:0;left:0;width:var(--sidebar-w);z-index:200;
  background:var(--side);border-right:1px solid var(--line);
  overflow-y:auto;padding:20px 14px 60px;transition:transform .3s ease;
}
.side-eyebrow{font-family:var(--mono);font-size:9px;letter-spacing:3px;text-transform:uppercase;
  color:var(--ink-dim);padding:4px 12px 12px}
.nav-group{margin-bottom:3px}
.nav-link{display:flex;align-items:center;gap:12px;width:100%;text-align:left;cursor:pointer;
  border:none;background:transparent;color:var(--ink);font-family:var(--display);font-weight:600;
  font-size:13.5px;padding:11px 12px;border-radius:var(--r-sm);transition:all .16s;position:relative}
.nav-link .nl-num{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--teal);
  width:20px;flex-shrink:0;text-align:center}
.nav-link .nl-txt{flex:1;line-height:1.25}
.nav-link .nl-state{flex-shrink:0;width:16px;height:16px;display:flex;align-items:center;justify-content:center}
.nav-link .nl-state svg{width:15px;height:15px}
.nav-link:hover:not(.locked){background:var(--teal-ghost)}
.nav-link.active{background:var(--teal-ghost2);color:var(--ink-bright)}
.nav-link.active .nl-num{color:var(--teal-soft)}
.nav-link.locked{cursor:not-allowed;opacity:.45}
.nav-link.locked .nl-num{color:var(--ink-dim)}
.nav-link.done .nl-state{color:var(--green)}
.nav-link.locked .nl-state{color:var(--ink-dim)}
.nav-sub{margin:1px 0 8px 32px;display:none;flex-direction:column;gap:1px;
  border-left:1px solid var(--line);padding-left:12px}
.nav-group.open .nav-sub{display:flex}
.nav-sublink{text-align:left;cursor:pointer;border:none;background:transparent;color:var(--ink-dim);
  font-family:var(--mono);font-size:11px;padding:6px 8px;border-radius:6px;transition:all .14s;line-height:1.4}
.nav-sublink:hover{color:var(--teal-soft);background:var(--teal-ghost)}
.side-foot{margin-top:24px;padding:16px 12px 0;border-top:1px solid var(--line);
  font-family:var(--mono);font-size:10px;color:var(--ink-dim);line-height:1.8;letter-spacing:.3px}
.side-foot b{color:var(--ink);font-weight:600}
.backdrop{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:190;opacity:0;visibility:hidden;transition:.25s}
.backdrop.show{opacity:1;visibility:visible}

/* ============ MAIN ============ */
.main{margin-left:var(--sidebar-w);padding-top:var(--topbar-h);min-height:100vh}
.section{display:none;animation:fade .4s ease both}
.section.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ============ HERO ============ */
.hero{position:relative;overflow:hidden;background:var(--hero);
  padding:clamp(56px,9vw,104px) 28px clamp(44px,7vw,72px);text-align:center}
.hero-grid{position:absolute;inset:0;pointer-events:none;opacity:.5;
  background-image:linear-gradient(var(--teal-ghost) 1px,transparent 1px),linear-gradient(90deg,var(--teal-ghost) 1px,transparent 1px);
  background-size:60px 60px;animation:grid 26s linear infinite}
@keyframes grid{to{background-position:0 60px}}
.hero-inner{position:relative;z-index:1;max-width:var(--maxw);margin:0 auto;display:flex;flex-direction:column;align-items:center}
.hero-org{font-family:var(--mono);font-size:10px;letter-spacing:3px;color:var(--teal);
  border:1px solid var(--line-strong);background:var(--panel);padding:7px 18px;border-radius:999px;margin-bottom:26px}
.hero h1{font-family:var(--display);font-size:clamp(34px,6.5vw,74px);font-weight:800;
  color:var(--ink-bright);letter-spacing:-1.5px;line-height:1.04}
.hero h1 .em{color:var(--teal);display:block}
.hero-sub{font-size:clamp(15px,2vw,18px);color:var(--ink-dim);margin:22px 0 38px;max-width:600px;line-height:1.6}
.hero-meta{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1px;
  background:var(--line);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;width:100%;max-width:760px}
.hero-meta .hm{background:var(--panel);padding:16px 18px;text-align:left}
.hero-meta .hm .l{font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--teal);margin-bottom:6px}
.hero-meta .hm .v{font-family:var(--display);font-size:14px;font-weight:600;color:var(--ink-bright)}

/* ============ SECTION HEADER ============ */
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 32px}
.sec-head{max-width:var(--maxw);margin:0 auto;padding:clamp(40px,6vw,64px) 32px 8px}
.sec-eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--teal);margin-bottom:14px}
.sec-title{font-family:var(--display);font-size:clamp(28px,4.5vw,44px);font-weight:800;
  color:var(--ink-bright);letter-spacing:-1px;line-height:1.08;margin-bottom:18px}
.sec-intro{font-size:16px;color:var(--ink-dim);max-width:720px;line-height:1.7}

/* ============ MODULE CARD (overview) ============ */
.module-card{max-width:var(--maxw);margin:34px auto 0;padding:0 32px}
.mc-inner{border:1px solid var(--line);background:linear-gradient(135deg,var(--teal-ghost) 0%,var(--panel) 60%);
  border-radius:var(--r);padding:26px 30px;box-shadow:var(--shadow-sm)}
.mc-head{font-family:var(--display);font-size:19px;font-weight:700;color:var(--ink-bright);margin-bottom:4px}
.mc-head small{display:block;font-family:var(--mono);font-size:10px;letter-spacing:2px;
  text-transform:uppercase;color:var(--teal);font-weight:500;margin-top:8px}
.mc-meta{display:flex;flex-wrap:wrap;gap:10px;margin:18px 0}
.mc-meta .chip{font-family:var(--mono);font-size:11px;color:var(--ink-dim);background:var(--bg2);
  border:1px solid var(--line);border-radius:999px;padding:6px 14px}
.mc-meta .chip b{color:var(--teal-soft);font-weight:600}
.mc-goals-label{font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;
  color:var(--ink-dim);margin:14px 0 10px}
.mc-goals{list-style:none;display:grid;grid-template-columns:1fr 1fr;gap:8px 22px}
.mc-goals li{position:relative;padding-left:22px;font-size:14px;color:var(--ink);line-height:1.5}
.mc-goals li::before{content:'';position:absolute;left:0;top:8px;width:8px;height:8px;border-radius:2px;
  background:var(--teal);box-shadow:0 0 8px var(--teal-ghost2)}
@media(max-width:620px){.mc-goals{grid-template-columns:1fr}}

/* ============ CONTENT ============ */
.content{max-width:var(--maxw);margin:0 auto;padding:8px 32px 0}
.subsection{font-family:var(--display);font-size:24px;font-weight:700;color:var(--ink-bright);
  letter-spacing:-.5px;margin:48px 0 16px;padding-bottom:12px;border-bottom:1px solid var(--line);
  display:flex;align-items:baseline;gap:12px}
.subsection .sx-num{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--teal);opacity:.8}
.sub2{font-family:var(--display);font-size:17px;font-weight:700;color:var(--teal-soft);margin:32px 0 12px}
.prose{font-size:15px;line-height:1.75;color:var(--ink);margin:14px 0;max-width:760px}
.prose code,.exp code,.alert code,.card-body code,td code{font-family:var(--mono);background:var(--bg2);
  border:1px solid var(--line);padding:1px 6px;border-radius:5px;color:var(--teal-soft);font-size:.88em}

/* cards grid */
.cards{display:grid;gap:14px;margin:22px 0;grid-template-columns:repeat(auto-fill,minmax(240px,1fr))}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:20px 22px;transition:all .2s}
.card:hover{border-color:var(--line-strong);transform:translateY(-2px);box-shadow:var(--shadow-sm)}
.card .card-title{font-family:var(--display);font-size:15px;font-weight:700;color:var(--ink-bright);margin-bottom:8px}
.card .card-body{font-size:13.5px;line-height:1.6;color:var(--ink-dim)}
.card .card-body strong{color:var(--ink)}
.card-img{display:block;width:calc(100% + 44px);height:160px;object-fit:cover;border-radius:var(--r) var(--r) 0 0;margin:-20px -22px 16px}

/* ============ COMMAND CARD (signature learning unit) ============ */
.cmd-card{margin:16px 0;border:1px solid var(--line);border-radius:var(--r);background:var(--panel);
  overflow:hidden;box-shadow:var(--shadow-sm)}
.cmd-card .cc-step{display:flex;align-items:center;gap:10px;padding:11px 16px;
  background:var(--bg2);border-bottom:1px solid var(--line)}
.cmd-card .cc-step .cc-badge{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:1px;
  color:var(--teal);background:var(--teal-ghost);border:1px solid var(--line-strong);
  border-radius:6px;padding:3px 9px;flex-shrink:0}
.cmd-card .cc-step .cc-name{font-family:var(--display);font-size:13.5px;font-weight:600;color:var(--ink-bright);flex:1;line-height:1.3}
.cmd-card .cc-line{position:relative;background:#040d0c;padding:15px 56px 15px 18px;overflow-x:auto}
[data-theme="light"] .cmd-card .cc-line{background:#0a1c1b}
.cmd-card .cc-line code{font-family:var(--mono);font-size:13px;line-height:1.7;color:#8fe8e3;
  white-space:pre;display:block;background:none;border:none;padding:0}
.cmd-card .cc-line .pfx{color:#3fb7b1;user-select:none}
.cmd-card .cc-copy{position:absolute;top:10px;right:10px}
.cmd-card .cc-exp{padding:13px 18px;font-size:13.5px;line-height:1.65;color:var(--ink-dim);
  display:flex;gap:10px}
.cmd-card .cc-exp::before{content:'';flex-shrink:0;width:3px;border-radius:3px;background:var(--teal);opacity:.5}
.cmd-card .cc-exp b{color:var(--ink)}

/* copy button */
.copy-btn{appearance:none;cursor:pointer;border:1px solid var(--line-strong);background:var(--panel2);
  color:var(--ink-dim);font-family:var(--mono);font-size:9.5px;font-weight:500;letter-spacing:1px;
  text-transform:uppercase;padding:5px 10px;border-radius:6px;display:inline-flex;align-items:center;
  gap:5px;transition:.16s;white-space:nowrap}
.copy-btn svg{width:12px;height:12px}
.copy-btn:hover{color:var(--teal-soft);border-color:var(--teal)}
.copy-btn.ok{background:var(--green);color:#06201a;border-color:var(--green)}
.cc-line .copy-btn{background:rgba(95,224,218,.1);border-color:rgba(95,224,218,.28);color:#bdeeeb}
.cc-line .copy-btn:hover{background:rgba(95,224,218,.2)}

/* output block (results of a command, terminal style, read-only) */
.outblock{background:#030b0a;border:1px solid var(--line-strong);border-left:3px solid var(--ink-dim);
  border-radius:0 var(--r-sm) var(--r-sm) 0;padding:14px 18px;margin:12px 0;font-family:var(--mono);
  font-size:12.5px;line-height:1.8;overflow-x:auto;color:#9fc4c1}
[data-theme="light"] .outblock{background:#0a1c1b;color:#bcdedb}
.outblock .o-label{font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;
  color:var(--ink-dim);margin-bottom:8px;display:block}
.outblock .ok{color:var(--green)} .outblock .warn{color:var(--amber)} .outblock .err{color:var(--red)}
.outblock .dim{color:#5d807d}

/* alerts */
.alert{border:1px solid;border-radius:var(--r);padding:16px 20px;margin:20px 0;font-size:14px;line-height:1.65}
.alert .a-title{font-family:var(--display);font-size:12px;letter-spacing:1px;text-transform:uppercase;
  font-weight:700;display:block;margin-bottom:7px}
.alert.info{border-color:var(--line-strong);background:var(--teal-ghost)} .alert.info .a-title{color:var(--teal-soft)}
.alert.warn{border-color:rgba(241,195,74,.4);background:rgba(241,195,74,.07)} .alert.warn .a-title{color:var(--amber)}
.alert.danger{border-color:rgba(240,113,110,.4);background:rgba(240,113,110,.06)} .alert.danger .a-title{color:var(--red)}
.alert code{background:var(--bg);}

/* attack card */
.attack-card{border:1px solid rgba(240,113,110,.34);background:linear-gradient(135deg,rgba(240,113,110,.06),var(--panel) 70%);
  border-left:3px solid var(--red);border-radius:var(--r);padding:24px 28px;margin:26px 0}
.attack-card .at-label{font-family:var(--mono);font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--red);margin-bottom:8px}
.attack-card .at-title{font-family:var(--display);font-size:22px;font-weight:700;color:var(--ink-bright);letter-spacing:-.5px;margin-bottom:10px}
.attack-card .at-desc{font-size:14px;line-height:1.7;color:var(--ink)}

/* vuln card */
.vuln-card{border:1px solid rgba(240,113,110,.3);background:rgba(240,113,110,.05);border-left:3px solid var(--red);
  border-radius:var(--r-sm);padding:16px 20px;margin:12px 0}
.vuln-card .v-title{font-family:var(--display);font-size:14px;font-weight:700;color:var(--red);margin-bottom:6px}
.vuln-card .prose{margin:0}

/* prevention card */
.prev-card{border:1px solid rgba(84,209,150,.3);background:rgba(84,209,150,.05);border-left:3px solid var(--green);
  border-radius:var(--r-sm);padding:18px 22px;margin:14px 0}
.prev-card .p-title{font-family:var(--display);font-size:15px;font-weight:700;color:var(--green);margin-bottom:8px;display:flex;align-items:center;gap:10px}
.prev-card .p-tag{font-family:var(--mono);font-size:9px;letter-spacing:1px;color:var(--green);
  border:1px solid rgba(84,209,150,.4);border-radius:5px;padding:2px 7px}
.prev-card .prose{margin:6px 0 0}

/* tables */
.table-wrap{overflow-x:auto;margin:20px 0;border:1px solid var(--line);border-radius:var(--r)}
table.data{width:100%;border-collapse:collapse;font-size:13.5px;min-width:480px}
table.data th{background:var(--bg2);color:var(--teal);font-family:var(--mono);font-size:10px;
  letter-spacing:1.5px;text-transform:uppercase;text-align:left;padding:12px 16px;border-bottom:1px solid var(--line)}
table.data td{padding:11px 16px;border-bottom:1px solid var(--line);color:var(--ink);vertical-align:top}
table.data tr:last-child td{border-bottom:none}
table.data tr:hover td{background:var(--teal-ghost)}
.badge{display:inline-block;font-family:var(--mono);font-size:10px;letter-spacing:.5px;padding:3px 8px;
  border-radius:5px;border:1px solid var(--teal);color:var(--teal-soft);background:var(--teal-ghost);white-space:nowrap}

/* compare grid */
.compare{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);border:1px solid var(--line);
  border-radius:var(--r);overflow:hidden;margin:22px 0}
@media(max-width:640px){.compare{grid-template-columns:1fr}}
.compare .cell{background:var(--panel);padding:22px 24px}
.compare .c-label{font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;font-weight:600}
.compare .cell.v1 .c-label{color:var(--red)} .compare .cell.v2 .c-label{color:var(--teal-soft)}
.compare ul{list-style:none}
.compare li{font-size:13.5px;color:var(--ink);padding:7px 0 7px 18px;border-bottom:1px solid var(--line);position:relative}
.compare li:last-child{border-bottom:none}
.compare li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:var(--teal)}
.compare .cell.v1 li::before{background:var(--red)}

/* packet viz */
.packet-legend{display:flex;flex-wrap:wrap;gap:18px;margin:14px 0;font-family:var(--mono);font-size:11px;color:var(--ink-dim)}
.packet-legend .pl{display:flex;align-items:center;gap:7px}
.packet-legend .pl .dot{width:12px;height:12px;border-radius:3px;border:1px solid;flex-shrink:0}
.packet-label{font-family:var(--mono);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;
  padding-left:11px;margin:22px 0 8px;border-left:3px solid var(--teal)}
.packet-viz{display:flex;gap:3px;overflow-x:auto;padding-bottom:8px;margin-bottom:6px}
.pf{background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:10px 14px;text-align:center;flex-shrink:0}
.pf .fn{font-family:var(--mono);font-size:9px;letter-spacing:.5px;color:var(--teal);margin-bottom:4px}
.pf .fv{font-family:var(--display);font-size:11px;font-weight:700;color:var(--ink-bright)}
.pf.grey{background:rgba(150,170,170,.08);border-color:rgba(150,170,170,.3)} .pf.grey .fn{color:var(--ink-dim)} .pf.grey .fv{color:var(--ink)}
.pf.green{background:rgba(84,209,150,.1);border-color:rgba(84,209,150,.4)} .pf.green .fn{color:var(--green)} .pf.green .fv{color:var(--green)}
.pf.blue{background:rgba(91,184,230,.12);border-color:rgba(91,184,230,.45)} .pf.blue .fn{color:var(--blue)} .pf.blue .fv{color:var(--blue)}
.pf.pay{background:var(--teal-ghost);min-width:140px}

/* step nav */
.stepnav{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:1px;
  background:var(--line);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;margin:24px 0}
.stepnav a{background:var(--panel);padding:16px 18px;text-align:center;cursor:pointer;transition:.18s;display:block}
.stepnav a:hover{background:var(--panel2);color:var(--teal-soft)}
.stepnav .sn-num{font-family:var(--display);font-size:26px;font-weight:800;color:var(--teal);opacity:.4;line-height:1;margin-bottom:6px}
.stepnav .sn-name{font-family:var(--display);font-size:13px;font-weight:600;color:var(--ink-bright);line-height:1.3}

/* result figure (discreet image, collapsed) */
.result{margin:20px 0;border:1px solid var(--line);border-radius:var(--r);background:var(--panel);overflow:hidden}
.result summary{cursor:pointer;list-style:none;padding:12px 18px;display:flex;align-items:center;gap:11px;
  font-family:var(--mono);font-size:11px;letter-spacing:1px;color:var(--ink-dim);user-select:none;transition:.16s}
.result summary::-webkit-details-marker{display:none}
.result summary:hover{color:var(--teal-soft);background:var(--teal-ghost)}
.result summary .ico{width:15px;height:15px;flex-shrink:0;color:var(--teal);transition:transform .2s}
.result[open] summary .ico{transform:rotate(90deg)}
.result summary .tag{font-family:var(--mono);font-size:9px;letter-spacing:1px;text-transform:uppercase;
  color:var(--teal);border:1px solid var(--line-strong);border-radius:5px;padding:2px 7px}
.result .r-body{padding:0 18px 16px;border-top:1px solid var(--line)}
.result img{display:block;max-width:100%;width:auto;max-height:420px;margin:14px auto 0;border-radius:var(--r-sm);
  border:1px solid var(--line)}
.result .r-cap{font-family:var(--mono);font-size:10.5px;color:var(--ink-dim);text-align:center;margin-top:10px;line-height:1.5}
.result .r-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-top:14px}
.result .r-grid img{margin:0;max-height:300px;width:100%;object-fit:cover}

/* ============ QUIZ ============ */
.quiz-wrap{max-width:var(--maxw);margin:40px auto 0;padding:0 32px}
.quiz-block{border:1px solid var(--line);border-radius:var(--r);background:var(--panel2);padding:24px 28px}
.quiz-head{font-family:var(--display);font-size:17px;font-weight:700;color:var(--ink-bright);margin-bottom:6px}
.quiz-sub{font-size:13px;color:var(--ink-dim);margin-bottom:18px}
details.quiz{border:1px solid var(--line);border-radius:var(--r-sm);margin:8px 0;overflow:hidden;background:var(--panel)}
details.quiz summary{cursor:pointer;list-style:none;padding:14px 18px;font-weight:600;font-size:14px;
  color:var(--ink);display:flex;align-items:center;gap:12px;transition:.16s}
details.quiz summary::-webkit-details-marker{display:none}
details.quiz summary .q-mark{font-family:var(--mono);font-size:13px;color:var(--teal);flex-shrink:0;transition:transform .2s}
details.quiz[open] summary .q-mark{transform:rotate(45deg)}
details.quiz summary:hover{background:var(--teal-ghost)}
details.quiz .ans{padding:0 18px 16px 42px;font-size:13.5px;line-height:1.7;color:var(--ink-dim)}
details.quiz .ans b{color:var(--teal-soft)}
.ex-task{margin-top:18px;border:1px dashed var(--line-strong);border-radius:var(--r-sm);padding:16px 20px;background:var(--bg2)}
.ex-task .et-label{font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--teal);margin-bottom:10px}
.ex-task ol{margin:10px 0 0 18px;font-size:13.5px;line-height:1.7;color:var(--ink)}
.ex-task p{font-size:13.5px;color:var(--ink);line-height:1.6}

/* ============ FLAG CONSOLE (signature) ============ */
.flag-wrap{max-width:var(--maxw);margin:44px auto 0;padding:0 32px}
.flag-console{position:relative;border:1px solid var(--line-strong);border-radius:var(--r);overflow:hidden;
  background:linear-gradient(160deg,var(--panel2),var(--panel));box-shadow:var(--shadow)}
.flag-console::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--teal),var(--amber),var(--teal));background-size:200% 100%;animation:flagscan 4s linear infinite}
@keyframes flagscan{to{background-position:200% 0}}
.flag-head{padding:22px 28px 0;display:flex;align-items:center;gap:12px}
.flag-head .fh-ico{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;
  background:var(--teal-ghost);border:1px solid var(--line-strong);color:var(--teal);flex-shrink:0}
.flag-head .fh-ico svg{width:18px;height:18px}
.flag-head .fh-txt .t{font-family:var(--display);font-size:18px;font-weight:700;color:var(--ink-bright)}
.flag-head .fh-txt .s{font-family:var(--mono);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-dim);margin-top:2px}
.flag-body{padding:18px 28px 26px}
.flag-token{display:flex;align-items:center;gap:12px;background:#040d0c;border:1px solid var(--line-strong);
  border-radius:var(--r-sm);padding:14px 18px;margin:14px 0;font-family:var(--mono)}
[data-theme="light"] .flag-token{background:#0a1c1b}
.flag-token .ft-code{font-size:15px;font-weight:600;color:var(--amber);letter-spacing:1px;flex:1;overflow-x:auto;white-space:nowrap}
.flag-token .copy-btn{background:rgba(241,195,74,.12);border-color:rgba(241,195,74,.34);color:#f3d488}
.flag-token .copy-btn:hover{background:rgba(241,195,74,.22)}
.flag-input-row{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
.flag-input{flex:1;min-width:220px;background:var(--bg2);border:1px solid var(--line-strong);border-radius:var(--r-sm);
  padding:13px 16px;font-family:var(--mono);font-size:14px;color:var(--ink-bright);transition:.16s;letter-spacing:.5px}
.flag-input::placeholder{color:var(--ink-dim)}
.flag-input:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-ghost)}
.flag-input.bad{border-color:var(--red);box-shadow:0 0 0 3px rgba(240,113,110,.15);animation:shake .35s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.btn{appearance:none;cursor:pointer;border:none;border-radius:var(--r-sm);font-family:var(--display);
  font-weight:600;font-size:14px;padding:13px 24px;transition:.18s;display:inline-flex;align-items:center;gap:8px}
.btn svg{width:16px;height:16px}
.btn-primary{background:var(--teal);color:#04201e}
.btn-primary:hover{background:var(--teal-soft)}
.btn-ghost{background:transparent;border:1px solid var(--line-strong);color:var(--ink)}
.btn-ghost:hover{border-color:var(--teal);color:var(--teal-soft)}
.flag-msg{font-family:var(--mono);font-size:12px;margin-top:12px;display:none;align-items:center;gap:8px}
.flag-msg.show{display:flex}
.flag-msg.good{color:var(--green)} .flag-msg.err{color:var(--red)}
.flag-done{border-top:1px solid var(--line);margin-top:20px;padding-top:20px;display:none}
.flag-done.show{display:block}
.flag-done .fd-banner{display:flex;align-items:center;gap:12px;color:var(--green);font-family:var(--display);
  font-weight:700;font-size:16px;margin-bottom:14px}
.flag-done .fd-banner svg{width:22px;height:22px}

/* locked overlay for a section */
.locked-screen{max-width:760px;margin:0 auto;padding:80px 32px;text-align:center}
.locked-screen .lk-ico{width:64px;height:64px;border-radius:16px;margin:0 auto 24px;display:flex;align-items:center;justify-content:center;
  background:var(--teal-ghost);border:1px solid var(--line-strong);color:var(--ink-dim)}
.locked-screen .lk-ico svg{width:30px;height:30px}
.locked-screen h2{font-family:var(--display);font-size:26px;font-weight:800;color:var(--ink-bright);margin-bottom:12px;letter-spacing:-.5px}
.locked-screen p{font-size:15px;color:var(--ink-dim);line-height:1.7;margin-bottom:26px}

/* ============ SCORE TOPBAR ============ */
.tb-score{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;
  color:var(--ink-dim);border:1px solid var(--line-strong);border-radius:999px;
  padding:6px 14px;white-space:nowrap}
.tb-score b{color:var(--teal-soft);font-weight:700}

/* ============ START BUTTON ============ */
.start-lab-btn{margin-top:28px;font-size:16px;padding:16px 40px;border-radius:var(--r);
  background:var(--teal);color:#04201e;border:none;cursor:pointer;font-family:var(--display);
  font-weight:700;display:inline-flex;align-items:center;gap:10px;transition:.2s}
.start-lab-btn:hover{background:var(--teal-soft);transform:translateY(-2px);box-shadow:var(--shadow)}
.start-lab-btn svg{width:20px;height:20px}

/* ============ FLAG HINT (quiz) ============ */
/* Bouton hint — toujours visible sur chaque question non résolue */
.qa-hint-btn{display:inline-flex;align-items:center;gap:6px;margin-top:10px;
  font-family:var(--mono);font-size:11px;color:var(--ink-dim);background:none;
  border:1px dashed var(--line-strong);border-radius:6px;padding:5px 12px;
  cursor:pointer;transition:.14s}
.qa-hint-btn:hover{color:var(--amber);border-color:rgba(241,195,74,.5);background:rgba(241,195,74,.05)}
.qa-hint-btn svg{width:13px;height:13px}
.qa-hint-btn.open{color:var(--amber);border-color:rgba(241,195,74,.5)}

/* Flag — toujours visible, discret par défaut */
.qa-flag{display:flex;margin-top:12px;align-items:center;gap:10px;
  background:rgba(255,255,255,.02);border:1px solid var(--line);
  border-radius:var(--r-sm);padding:10px 14px;flex-wrap:wrap;transition:.2s}
.qa-flag.show{background:#040d0c;border-color:rgba(241,195,74,.4)}
[data-theme="light"] .qa-flag.show{background:#0a1c1b}
.qa-flag .qf-ico{color:var(--ink-dim);display:flex;transition:.2s}
.qa-flag.show .qf-ico{color:var(--green)}
.qa-flag .qf-ico svg{width:15px;height:15px}
.qa-flag .qf-label{font-family:var(--mono);font-size:9px;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--ink-dim)}
/* Placeholder masqué */
.qa-flag .qf-masked{font-family:var(--mono);font-size:14px;font-weight:600;
  letter-spacing:4px;color:var(--ink-dim);opacity:.4;flex:1}
/* Vrai flag (caché par défaut) */
.qa-flag .qf-code{display:none;font-family:var(--mono);font-size:15px;font-weight:600;
  letter-spacing:1px;color:var(--amber);flex:1;min-width:80px}
.qa-flag.show .qf-masked{display:none}
.qa-flag.show .qf-code{display:block}
/* État intermédiaire : hint cliqué mais pas encore résolu */
.qa-flag.hinted{border-color:rgba(241,195,74,.25);background:rgba(241,195,74,.03)}
.qa-flag.hinted .qf-masked{display:none}
.qa-flag.hinted .qf-code{display:block;opacity:.7}

/* intro + goals */
.sec-intro{font-size:15px;line-height:1.75;color:var(--ink);margin-bottom:0;border-left:3px solid var(--teal-deep);padding-left:18px}
.goals-list{list-style:none;display:flex;flex-direction:column;gap:8px;margin-top:16px;padding:0}
.goals-list li{display:flex;align-items:flex-start;gap:10px;font-size:13.5px;color:var(--ink-dim);line-height:1.5}
.goals-list li::before{content:"→";color:var(--teal);font-family:var(--mono);flex-shrink:0}

/* divider + footer */
.divider{max-width:var(--maxw);margin:40px auto;padding:0 32px}
.divider hr{border:none;border-top:1px solid var(--line)}
footer{background:var(--bg2);border-top:1px solid var(--line);padding:30px 32px;text-align:center;
  font-family:var(--mono);font-size:11px;color:var(--ink-dim);letter-spacing:.3px;margin-top:64px}

/* scroll-top */
.scroll-top{position:fixed;bottom:24px;right:24px;width:46px;height:46px;border-radius:50%;z-index:160;
  background:var(--teal-deep);border:1px solid var(--teal);color:var(--on-deep);cursor:pointer;
  display:flex;align-items:center;justify-content:center;opacity:0;transform:translateY(10px);
  transition:.25s;box-shadow:var(--shadow)}
.scroll-top svg{width:20px;height:20px}
.scroll-top.show{opacity:1;transform:none}
.scroll-top:hover{background:var(--teal)}

/* ============ RESPONSIVE ============ */
@media(max-width:1080px){
  :root{--sidebar-w:0px}
  .sidebar{transform:translateX(-100%);width:288px;z-index:260}
  .sidebar.open{transform:translateX(0);box-shadow:var(--shadow)}
  .main{margin-left:0}
  .menu-btn{display:flex}
}
@media(max-width:760px){
  body{font-size:14.5px}
  .wrap,.sec-head,.module-card,.content,.quiz-wrap,.flag-wrap,.divider{padding-left:20px;padding-right:20px}
  .tb-label{display:none}
  .tb-progress .pmeta{display:none}
  .hero{padding:48px 20px 40px}
  .mc-inner{padding:22px}
  .quiz-block{padding:20px}
  .flag-body,.flag-head{padding-left:20px;padding-right:20px}
  .cmd-card .cc-line{padding-right:18px;padding-bottom:46px}
  .cmd-card .cc-copy{top:auto;bottom:10px;right:14px}
}
@media(max-width:520px){
  .brand small{display:none}
  .seg-btn{padding:7px 10px}
  .seg-btn span.txt{display:none}
}

/* ============ command env badge ============ */
.cmd-card .cc-step{flex-wrap:wrap;gap:8px}
.cmd-card .cc-step .cc-name{flex:1 1 auto;min-width:100px}
.cc-env{margin-left:auto;font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.6px;
  text-transform:uppercase;padding:3px 9px;border-radius:6px;border:1px solid;white-space:nowrap}
.cc-env.ubuntu{color:#f0a85f;border-color:rgba(240,168,95,.45);background:rgba(240,168,95,.1)}
.cc-env.wsl{color:#5bb8e6;border-color:rgba(91,184,230,.45);background:rgba(91,184,230,.1)}
.cc-env.ps{color:#9db4ff;border-color:rgba(157,180,255,.45);background:rgba(157,180,255,.1)}
.cc-env.cmd{color:#cfd8dc;border-color:rgba(207,216,220,.4);background:rgba(207,216,220,.08)}
.cc-env.mav{color:var(--amber);border-color:rgba(241,195,74,.45);background:rgba(241,195,74,.1)}

/* ============ simplified module bar ============ */
.module-card .mod-bar{display:flex;flex-wrap:wrap;gap:18px;align-items:stretch;
  border:1px solid var(--line);border-radius:var(--r);background:linear-gradient(135deg,var(--teal-ghost),var(--panel) 62%);
  padding:22px 26px;box-shadow:var(--shadow-sm)}
.mod-bar .mb-obj{flex:1 1 280px}
.mod-bar .mb-dur{flex:0 0 auto;display:flex;flex-direction:column;justify-content:center;
  border-left:1px solid var(--line);padding-left:20px;min-width:120px}
.mb-label{display:block;font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--teal);margin-bottom:7px}
.mb-obj .mb-text{font-size:15.5px;line-height:1.6;color:var(--ink)}
.mb-dur .mb-val{font-family:var(--display);font-weight:700;font-size:17px;color:var(--ink-bright)}
@media(max-width:560px){.mod-bar .mb-dur{border-left:none;padding-left:0;border-top:1px solid var(--line);padding-top:14px}}

/* ============ hero track picker ============ */
.track-pick{margin-top:34px;width:100%;max-width:540px;border:1px solid var(--line-strong);
  border-radius:var(--r);background:var(--panel);padding:22px 24px;text-align:left}
.track-pick .tp-label{font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--teal);margin-bottom:14px}
.track-pick .tp-btns{display:flex;gap:12px;flex-wrap:wrap}
.tp-btn{flex:1 1 190px;cursor:pointer;border:1px solid var(--line-strong);background:var(--bg2);color:var(--ink);
  border-radius:var(--r-sm);padding:15px 18px;font-family:var(--display);font-weight:600;font-size:14.5px;
  display:flex;align-items:center;gap:11px;transition:.18s}
.tp-btn svg{width:20px;height:20px;flex-shrink:0}
.tp-btn:hover{border-color:var(--teal);color:var(--teal-soft)}
.tp-btn.active{background:var(--teal-deep);color:var(--on-deep);border-color:var(--teal)}
.track-pick .tp-note{font-family:var(--mono);font-size:10px;color:var(--ink-dim);margin-top:13px}


/* ── Version fixée (linux.html / windows.html) ── */
.seg-fixed{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;
  color:var(--teal-soft);padding:6px 12px;border:1px solid var(--teal-deep);
  border-radius:6px;background:var(--teal-ghost)}
.tp-fixed{display:inline-flex;align-items:center;gap:10px;margin-top:28px;
  font-family:var(--mono);font-size:13px;color:var(--teal-soft);padding:12px 20px;
  border:1px solid var(--teal-deep);border-radius:var(--r-sm);background:var(--teal-ghost)}
.tp-fixed svg{width:18px;height:18px;flex-shrink:0}
/* ============ track banner ============ */
.track-banner{display:flex;align-items:center;gap:12px;margin:18px 0 0;border-radius:var(--r-sm);
  padding:13px 16px;font-size:13.5px;border:1px solid}
.track-banner svg{width:20px;height:20px;flex-shrink:0}
.track-banner b{font-family:var(--display);font-weight:700;color:var(--ink-bright)}
.track-banner.ubuntu{border-color:rgba(240,168,95,.4);background:rgba(240,168,95,.08)}
.track-banner.ubuntu svg{color:#f0a85f}
.track-banner.win{border-color:rgba(91,184,230,.4);background:rgba(91,184,230,.08)}
.track-banner.win svg{color:#5bb8e6}
.track-banner .tb-switch{margin-left:auto;cursor:pointer;font-family:var(--mono);font-size:10px;letter-spacing:.5px;
  text-transform:uppercase;border:1px solid var(--line-strong);background:var(--panel);color:var(--ink-dim);
  border-radius:6px;padding:6px 11px;transition:.16s;white-space:nowrap}
.track-banner .tb-switch:hover{color:var(--teal-soft);border-color:var(--teal)}

/* ============ validation ============ */
.val-wrap{max-width:var(--maxw);margin:44px auto 0;padding:0 32px}
.val-console{position:relative;border:1px solid var(--line-strong);border-radius:var(--r);overflow:hidden;
  background:linear-gradient(160deg,var(--panel2),var(--panel));box-shadow:var(--shadow)}
.val-console::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--teal),var(--amber),var(--teal));background-size:200% 100%;animation:flagscan 4s linear infinite}
.val-head{padding:22px 28px 6px;display:flex;align-items:center;gap:12px}
.val-head .vh-ico{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;
  background:var(--teal-ghost);border:1px solid var(--line-strong);color:var(--teal);flex-shrink:0}
.val-head .vh-ico svg{width:18px;height:18px}
.val-head .t{font-family:var(--display);font-size:18px;font-weight:700;color:var(--ink-bright)}
.val-head .s{font-family:var(--mono);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-dim);margin-top:2px}
.val-body{padding:14px 28px 26px}
.val-progress{font-family:var(--mono);font-size:11px;color:var(--ink-dim);margin:4px 0 6px}
.val-progress b{color:var(--teal-soft)}
.qa{border:1px solid var(--line);border-radius:var(--r-sm);background:var(--panel);padding:18px 20px;margin:14px 0;transition:.2s}
.qa.solved{border-color:rgba(84,209,150,.45);background:rgba(84,209,150,.05)}
.qa .qa-q{font-size:14.5px;color:var(--ink-bright);font-weight:600;margin-bottom:13px;display:flex;gap:10px;line-height:1.5}
.qa .qa-q .qa-n{font-family:var(--mono);font-size:12px;color:var(--teal);flex-shrink:0;font-weight:600}
.qa .qa-row{display:flex;gap:10px;flex-wrap:wrap}
.qa-input{flex:1;min-width:200px;background:var(--bg2);border:1px solid var(--line-strong);border-radius:var(--r-sm);
  padding:11px 14px;font-family:var(--mono);font-size:13.5px;color:var(--ink-bright);transition:.16s}
.qa-input::placeholder{color:var(--ink-dim)}
.qa-input:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-ghost)}
.qa-input.bad{border-color:var(--red);box-shadow:0 0 0 3px rgba(240,113,110,.15);animation:shake .35s}
.qa-input:disabled{opacity:.65}
.qa-msg{font-family:var(--mono);font-size:11.5px;margin-top:10px;display:none;align-items:center;gap:7px}
.qa-msg.show{display:flex}.qa-msg.err{color:var(--red)}
/* .qa-flag — styles définis dans la section FLAG HINT ci-dessus */
.val-done{display:none;border-top:1px solid var(--line);margin-top:20px;padding-top:20px}
.val-done.show{display:block}
.val-done .vd-banner{display:flex;align-items:center;gap:12px;color:var(--green);font-family:var(--display);font-weight:700;font-size:16px;margin-bottom:14px}
.val-done .vd-banner svg{width:22px;height:22px;flex-shrink:0}
@media(max-width:760px){.val-wrap{padding-left:20px;padding-right:20px}.val-body,.val-head{padding-left:20px;padding-right:20px}}

</style>
